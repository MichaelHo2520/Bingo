<!DOCTYPE html>
<html lang="zh-Hant" data-theme="sunset">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BINGO ｜ 賓果</title>
<!-- BINGO 賓果遊戲 · v1.8.2 -->
<meta name="version" content="1.8.2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  /* ---------- Themes ---------- */
  :root[data-theme="sunset"]{
    --bg1:#2a1136; --bg2:#7a2d54; --bg3:#c85a3c;
    --panel:rgba(255,244,236,.10); --panel-line:rgba(255,255,255,.16);
    --cell:#fff6ec; --cell-edge:#e9d3bd; --cell-text:#4a2b1f;
    --accent:#ff8a3d; --accent-2:#ffd24a; --daub:#ff5a5f; --daub-ink:#fff;
    --text:#fff3ea; --muted:#e7c9bd; --marquee:#ffd24a;
  }
  :root[data-theme="midnight"]{
    --bg1:#05060f; --bg2:#0d1b3a; --bg3:#101026;
    --panel:rgba(120,160,255,.07); --panel-line:rgba(140,190,255,.18);
    --cell:#141a33; --cell-edge:#26305a; --cell-text:#dbe6ff;
    --accent:#22e0ff; --accent-2:#ff4bd8; --daub:#ff2fb0; --daub-ink:#0a0016;
    --text:#eaf2ff; --muted:#8fa2cc; --marquee:#22e0ff;
  }
  :root[data-theme="bubblegum"]{
    --bg1:#ffd9ec; --bg2:#ffc1e3; --bg3:#d5c2ff;
    --panel:rgba(255,255,255,.35); --panel-line:rgba(180,90,170,.22);
    --cell:#ffffff; --cell-edge:#f4c9e4; --cell-text:#7a2b63;
    --accent:#ff4fa3; --accent-2:#9b6bff; --daub:#ff2f86; --daub-ink:#fff;
    --text:#6a1f57; --muted:#a76b96; --marquee:#ff4fa3;
  }
  :root[data-theme="meadow"]{
    --bg1:#16351f; --bg2:#2f6b3c; --bg3:#7fae4a;
    --panel:rgba(245,255,235,.10); --panel-line:rgba(255,255,255,.16);
    --cell:#f7fbec; --cell-edge:#d5e4bd; --cell-text:#274224;
    --accent:#6cc04a; --accent-2:#ffcf47; --daub:#e0563b; --daub-ink:#fff;
    --text:#f2f8e8; --muted:#c3d6b3; --marquee:#ffcf47;
  }
  :root[data-theme="arcade"]{
    --bg1:#000000; --bg2:#140018; --bg3:#001018;
    --panel:rgba(255,255,255,.05); --panel-line:rgba(255,255,255,.14);
    --cell:#0e0e12; --cell-edge:#2a2a33; --cell-text:#f5f5f5;
    --accent:#ffe600; --accent-2:#ff2d55; --daub:#ff2d55; --daub-ink:#000;
    --text:#ffffff; --muted:#8a8a92; --marquee:#ffe600;
  }
  /* E-book / e-ink: pure monochrome, flat, no motion */
  :root[data-theme="ebook"]{
    --bg1:#ffffff; --bg2:#ffffff; --bg3:#ffffff;
    --panel:#ffffff; --panel-line:#000000;
    --cell:#ffffff; --cell-edge:#000000; --cell-text:#000000;
    --accent:#000000; --accent-2:#000000; --daub:#000000; --daub-ink:#ffffff;
    --text:#000000; --muted:#555555; --marquee:#000000;
  }
  :root[data-theme="ebook"] *{animation:none!important;transition:none!important;text-shadow:none!important;backdrop-filter:none!important}
  :root[data-theme="ebook"] body{background:#fff!important}
  :root[data-theme="ebook"] .panel,
  :root[data-theme="ebook"] .status,
  :root[data-theme="ebook"] .icon-btn{background:#fff;box-shadow:none}
  :root[data-theme="ebook"] .cell{box-shadow:none;border-width:2px}
  :root[data-theme="ebook"] .cell .daub{display:none}
  :root[data-theme="ebook"] .cell.marked{background:#000;border-color:#000}
  :root[data-theme="ebook"] .cell.marked .num{color:#fff;transform:none}
  :root[data-theme="ebook"] .cell.inline{box-shadow:inset 0 0 0 3px #fff;border-color:#000}
  :root[data-theme="ebook"] .seg{background:#fff;border:1px solid #000}
  :root[data-theme="ebook"] .seg button.on{background:#000;color:#fff}
  :root[data-theme="ebook"] .btn.primary{background:#000;color:#fff}
  :root[data-theme="ebook"] .btn.ghost,
  :root[data-theme="ebook"] .mini{background:#fff;border:1px solid #000}
  :root[data-theme="ebook"] .marquee .bulb{color:#bbb;opacity:1}
  :root[data-theme="ebook"] .marquee .bulb.lit{color:#000;transform:none}
  :root[data-theme="ebook"] .veil{background:rgba(255,255,255,.9)}
  :root[data-theme="ebook"] .win-card{background:#fff;border:2px solid #000}
  :root[data-theme="ebook"] .win-card .word{background:none;color:#000;-webkit-text-fill-color:#000}
  :root[data-theme="ebook"] .cell.empty-cell{background:#fff;border:2px dashed #999;color:#999}


  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(120% 120% at 15% 0%, var(--bg2) 0%, transparent 55%),
      radial-gradient(120% 120% at 100% 100%, var(--bg3) 0%, transparent 50%),
      var(--bg1);
    background-attachment:fixed;
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:16px;gap:14px;overflow-x:hidden;
    transition:background .5s ease;
  }
  .display{font-family:'Fredoka',sans-serif}

  /* ---------- Top bar ---------- */
  .topbar{width:min(92vw,520px);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .marquee{display:flex;gap:6px;align-items:flex-end}
  .marquee .bulb{
    font-family:'Fredoka',sans-serif;font-weight:700;
    font-size:clamp(28px,9vw,44px);line-height:1;
    color:var(--muted);letter-spacing:1px;
    transition:color .3s, text-shadow .3s, transform .3s;
    position:relative;opacity:.55;
  }
  .marquee .bulb.lit{
    color:var(--marquee);opacity:1;
    text-shadow:0 0 8px var(--marquee), 0 0 22px var(--marquee);
    transform:translateY(-2px);
  }
  .tools{display:flex;gap:8px}
  .icon-btn{
    width:42px;height:42px;border-radius:13px;border:1px solid var(--panel-line);
    background:var(--panel);color:var(--text);font-size:19px;cursor:pointer;
    display:grid;place-items:center;backdrop-filter:blur(6px);transition:transform .15s, background .2s;
  }
  .icon-btn:hover{transform:translateY(-2px)}
  .icon-btn:active{transform:scale(.94)}
  .icon-btn.active{background:var(--accent);border-color:var(--accent)}
  .icon-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
  :root[data-theme="ebook"] .icon-btn.active{background:#000;border-color:#000}
  .icon-btn:focus-visible,.btn:focus-visible,.cell:focus-visible,.mini:focus-visible{outline:3px solid var(--accent-2);outline-offset:2px}

  /* ---------- Panel ---------- */
  .panel{
    width:min(92vw,520px);background:var(--panel);border:1px solid var(--panel-line);
    border-radius:20px;padding:16px;backdrop-filter:blur(10px);
  }
  .subtitle{font-weight:800;font-size:15px;letter-spacing:.4px}
  .hint{color:var(--muted);font-size:13.5px;margin-top:3px;line-height:1.5}

  /* ---------- Segmented / options ---------- */
  .seg{display:flex;background:rgba(0,0,0,.14);border-radius:12px;padding:3px;gap:4px}
  .seg button{
    flex:1;border:0;background:transparent;color:var(--muted);font-family:'Nunito';font-weight:800;
    font-size:14px;padding:8px 8px;border-radius:9px;cursor:pointer;transition:.2s;white-space:nowrap;
  }
  .seg button.on{background:var(--accent);color:#1c1008;box-shadow:0 4px 14px rgba(0,0,0,.2)}
  .seg.readonly{pointer-events:none}   /* 訪客:出手順序只讀,不能改但看得到房主的選擇 */
  :root[data-theme="midnight"] .seg button.on,
  :root[data-theme="arcade"] .seg button.on{color:var(--daub-ink)}

  /* ---------- Field block:標籤在上、控制項滿版、共用同一條左右基準線 ---------- */
  .field{margin-top:12px}
  .field-label{display:block;font-weight:800;font-size:12px;color:var(--muted);letter-spacing:.3px;margin-bottom:5px}
  .field .mp-input{width:100%;height:44px}

  /* 全寬 stepper:− 靠左、＋ 靠右、數字置中,與 seg 同寬同高 */
  .stepper-bar{display:flex;align-items:center;background:rgba(0,0,0,.14);border-radius:12px;padding:3px;gap:4px}
  .stepper-bar .mini{flex:0 0 auto;width:56px;height:auto;min-height:34px;border:0;background:transparent;border-radius:9px;font-size:20px}
  .stepper-bar .mini:hover{background:rgba(255,255,255,.08)}
  .stepper-bar .target-val{flex:1;font-size:20px}
  :root[data-theme="ebook"] .stepper-bar{background:#fff;border:1px solid #000}

  /* .row 保留給房間橫幅(mpBar)使用 */
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .row .label{font-weight:800;font-size:14px}
  .mini{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--panel-line);
    background:rgba(255,255,255,.08);color:var(--text);font-size:18px;font-weight:800;cursor:pointer;
    display:grid;place-items:center;
  }
  .mini:active{transform:scale(.9)}
  .target-val{font-family:'Fredoka';font-weight:700;font-size:22px;min-width:26px;text-align:center}

  /* ---------- Grid ---------- */
  .board-wrap{width:min(92vw,520px);display:flex;flex-direction:column;align-items:center;gap:12px}
  .grid{
    --gap:clamp(6px,1.6vw,10px);
    width:min(92vw,520px);aspect-ratio:1;
    display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);
    gap:var(--gap);
  }
  .cell{
    position:relative;border:0;cursor:pointer;border-radius:16px;
    background:var(--cell);border:2px solid var(--cell-edge);
    color:var(--cell-text);font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:var(--cellfont,clamp(20px,6.5vw,40px));
    display:grid;place-items:center;overflow:hidden;
    transition:transform .12s ease, box-shadow .25s, border-color .25s;
    box-shadow:0 3px 0 var(--cell-edge);
  }
  .cell:hover{transform:translateY(-2px)}
  .cell:active{transform:translateY(1px)}
  .cell .num{position:relative;z-index:2;transition:color .2s, transform .2s}
  /* daub stamp */
  .cell .daub{
    position:absolute;z-index:1;inset:0;margin:auto;width:78%;height:78%;
    border-radius:50%;background:var(--daub);
    transform:scale(0) rotate(-12deg);opacity:0;
    transition:transform .28s cubic-bezier(.34,1.56,.64,1), opacity .2s;
    box-shadow:0 4px 12px rgba(0,0,0,.28) inset, 0 3px 10px rgba(0,0,0,.25);
  }
  .cell.marked .daub{transform:scale(1) rotate(0);opacity:1}
  .cell.marked .num{color:var(--daub-ink);transform:scale(1.05)}
  .cell.inline{border-color:var(--accent-2);box-shadow:0 0 0 3px var(--accent-2), 0 0 18px var(--accent-2)}

  /* manual tap-to-place */
  .cell.empty-cell{background:var(--panel);border:2px dashed var(--panel-line);box-shadow:none;color:var(--muted)}
  .cell.empty-cell:hover{border-color:var(--accent);border-style:solid;transform:translateY(-2px)}
  .cell.just-placed{animation:place .25s ease}
  @keyframes place{from{transform:scale(.78)}to{transform:scale(1)}}

  /* ---------- Buttons ---------- */
  .actions{display:flex;gap:10px;width:min(92vw,520px);flex-wrap:wrap}
  .btn{
    flex:1;min-width:120px;border:0;border-radius:15px;padding:15px 16px;cursor:pointer;
    font-family:'Fredoka';font-weight:600;font-size:17px;transition:transform .15s, filter .2s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0) scale(.98)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#1c1008}
  :root[data-theme="midnight"] .btn.primary,:root[data-theme="arcade"] .btn.primary{color:var(--daub-ink)}
  .btn.ghost{background:var(--panel);border:1px solid var(--panel-line);color:var(--text)}

  .status{width:min(92vw,520px);display:flex;justify-content:space-between;align-items:center;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:15px;padding:12px 16px}
  .status .big{font-family:'Fredoka';font-weight:700;font-size:20px}
  .status .lbl{color:var(--muted);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}

  /* ---------- Win overlay ---------- */
  .veil{position:fixed;inset:0;display:none;place-items:center;z-index:50;
    background:rgba(0,0,0,.55);backdrop-filter:blur(4px);padding:20px}
  .veil.show{display:grid}
  .win-card{background:var(--panel);border:1px solid var(--panel-line);border-radius:26px;
    padding:34px 30px;text-align:center;max-width:380px;backdrop-filter:blur(14px);
    animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .win-card .word{font-family:'Fredoka';font-weight:700;font-size:clamp(46px,15vw,76px);line-height:1;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .win-card p{color:var(--muted);margin:10px 0 22px;font-weight:700}
  .win-card .actions{width:100%}
  .win-card .btn{min-width:0;font-size:16px;padding:14px 10px}
  /* 猜拳/揭曉蓋板:比勝利卡稍寬,容得下橫排手勢卡 */
  .mp-veil-card{max-width:min(92vw,440px)}
  .mp-veil-title{font-family:'Fredoka';font-weight:700;font-size:23px;margin-bottom:8px}
  .mp-veil-card .rps-btns{margin-top:4px}
  .mp-veil-card .actions{margin-top:16px}
  /* 先關掉結果卡看看牌面(不重來、不離開) */
  .peek-link{margin-top:14px;background:none;border:0;cursor:pointer;
    color:var(--muted);font-family:'Nunito';font-weight:800;font-size:14px;
    text-decoration:underline;text-underline-offset:3px}
  .peek-link:hover{color:var(--text)}
  /* 偷看牌面時,浮在底部、可再叫回結果卡 */
  .peek-reopen{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:55;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#1c1008;border:0;
    border-radius:999px;padding:12px 22px;cursor:pointer;
    font-family:'Fredoka';font-weight:700;font-size:16px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  :root[data-theme="midnight"] .peek-reopen,
  :root[data-theme="arcade"] .peek-reopen{color:var(--daub-ink)}
  :root[data-theme="ebook"] .peek-link{color:#555}
  :root[data-theme="ebook"] .peek-reopen{background:#000;color:#fff;box-shadow:none;border:1px solid #000}
  canvas.confetti{position:fixed;inset:0;pointer-events:none;z-index:60}

  /* ---------- Settings sheet ---------- */
  .set-card{background:var(--panel);border:1px solid var(--panel-line);border-radius:26px;
    padding:22px 22px 24px;max-width:360px;width:100%;backdrop-filter:blur(14px);
    animation:pop .3s cubic-bezier(.34,1.56,.64,1)}
  .set-head{font-family:'Fredoka';font-weight:700;font-size:23px;margin-bottom:10px;text-align:center}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:15px 2px;border-top:1px solid var(--panel-line)}
  .set-lbl{font-weight:800;font-size:15px}
  .swatches{display:flex;gap:9px}
  .swatch{width:30px;height:30px;border-radius:50%;border:2px solid var(--panel-line);cursor:pointer;
    padding:0;transition:transform .12s}
  .swatch:hover{transform:scale(1.12)}
  .swatch.on{border-color:var(--text);box-shadow:0 0 0 2px var(--accent)}
  .swatches.locked{opacity:.3;pointer-events:none}
  .switch{width:52px;height:30px;border-radius:999px;border:1px solid var(--panel-line);
    background:rgba(255,255,255,.12);cursor:pointer;padding:0;position:relative;transition:background .2s}
  .switch .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
    background:var(--text);transition:transform .2s}
  .switch[aria-checked="true"]{background:var(--accent)}
  .switch[aria-checked="true"] .knob{transform:translateX(22px);background:#fff}
  .set-card .btn{width:100%;margin-top:18px}
  :root[data-theme="ebook"] .set-card{background:#fff;border:2px solid #000}
  :root[data-theme="ebook"] .switch{background:#fff;border:1px solid #000}
  :root[data-theme="ebook"] .switch[aria-checked="true"]{background:#000}
  :root[data-theme="ebook"] .switch .knob{background:#000}
  :root[data-theme="ebook"] .switch[aria-checked="true"] .knob{background:#fff}
  :root[data-theme="ebook"] .swatch.on{border-color:#000;box-shadow:0 0 0 2px #000}

  .hidden{display:none!important}
  /* multiplayer */
  .mp-input{
    flex:1;min-width:0;background:rgba(255,255,255,.12);border:1px solid var(--panel-line);
    border-radius:12px;padding:11px 14px;color:var(--text);font-family:'Nunito';font-weight:800;font-size:15px;outline:none;
  }
  .mp-input.wide{flex:1}
  .mp-input::placeholder{color:var(--muted)}
  #mpCode,#mpCreateCode{letter-spacing:6px;font-family:'Fredoka';text-align:center}
  .or-divider{display:flex;align-items:center;gap:12px;margin:16px 2px 12px;color:var(--muted);font-size:12.5px;font-weight:800}
  .or-divider::before,.or-divider::after{content:"";flex:1;height:1px;background:var(--panel-line)}
  /* 連線面板標題列:返回箭頭 + 標題 */
  .mp-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .mp-head .subtitle{margin:0}
  /* 房號輸入框 + 內嵌掃描圖示鈕(收進框內右側,讓輸入框左緣與其他欄位對齊) */
  .input-wrap{position:relative;width:100%}
  .input-wrap .mp-input{width:100%;padding-left:46px;padding-right:46px}
  .input-icon-btn{position:absolute;top:50%;right:6px;transform:translateY(-50%);
    width:38px;height:38px;border:0;border-radius:10px;background:transparent;color:var(--muted);
    font-size:19px;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .input-icon-btn:hover{background:rgba(255,255,255,.10);color:var(--text)}
  /* 滿版主鈕:每個區塊唯一的主要動作,左右緣與輸入框對齊 */
  .block-btn{display:block;width:100%;flex:none;min-width:0;margin-top:10px;padding:13px 16px;font-size:16px}
  /* 加入房間:外框式次要主鈕,與實心橘色的「建立房間」明顯區分 */
  .btn.outline{background:transparent;border:2px solid var(--accent);color:var(--accent)}
  .btn.outline:not(:disabled):hover{background:rgba(255,255,255,.06)}
  :root[data-theme="ebook"] .btn.outline{border-color:#000;color:#000}
  .btn:disabled,.btn[disabled]{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none}
  .btn:disabled:hover,.btn[disabled]:hover{transform:none;background:transparent}
  .room-list{display:flex;flex-direction:column;gap:8px}
  .room-list:not(:empty){margin-top:10px}
  .room-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;
    background:rgba(255,255,255,.10);border:1px solid var(--panel-line);border-radius:12px;
    padding:12px 14px;cursor:pointer;color:var(--text);font-weight:800;transition:transform .1s,border-color .12s}
  .room-item:hover{transform:translateY(-1px);border-color:var(--accent)}
  .room-item .rc{font-family:'Fredoka';font-size:18px;letter-spacing:2px}
  .room-item .meta{margin-left:auto;color:var(--muted);font-size:13px;font-weight:700}
  .room-item.busy{opacity:.5;cursor:not-allowed}
  .room-item.busy:hover{transform:none;border-color:var(--panel-line)}
  .room-empty{color:var(--muted);font-size:13px;padding:6px 2px}
  :root[data-theme="ebook"] .room-item{background:#fff;border:1px solid #000}
  .mp-status{font-weight:800;font-size:13px;color:var(--accent)}
  .mp-players{display:flex;flex-wrap:wrap;gap:14px 12px;margin-top:12px}
  .mp-chip{
    display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.10);
    border:1px solid var(--panel-line);border-radius:999px;padding:6px 13px;font-weight:800;font-size:14px;
  }
  .mp-chip.clickable{cursor:pointer;transition:transform .1s,border-color .12s}
  .mp-chip.clickable:hover{transform:translateY(-1px);border-color:var(--accent)}
  .mp-chip .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .mp-chip.ready .dot{background:var(--accent)}
  .mp-chip .ln{font-family:'Fredoka';color:var(--accent);font-weight:700}
  .mp-chip.me{border-color:var(--accent)}
  /* 房主用:大廳時每個非自己的玩家晶片右側出現的移除鈕 */
  .mp-chip .mp-kick{display:inline-grid;place-items:center;width:20px;height:20px;margin-left:3px;padding:0;
    border:none;border-radius:50%;background:#ff5252;color:#fff;line-height:0;cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.28);transition:background .15s,transform .1s}
  .mp-chip .mp-kick svg{display:block}
  .mp-chip .mp-kick:hover{background:#e03131;transform:scale(1.1)}
  :root[data-theme="ebook"] .mp-chip .mp-kick{background:#000;color:#fff;border:1px solid #000;box-shadow:none}
  :root[data-theme="ebook"] .mp-chip .mp-kick:hover{background:#333}
  .mp-chip .seat-badge{display:inline-grid;place-items:center;min-width:20px;height:20px;padding:0 5px;
    border-radius:10px;background:var(--accent);color:#1c1008;font-family:'Fredoka';font-weight:700;font-size:12.5px}
  :root[data-theme="midnight"] .mp-chip .seat-badge,
  :root[data-theme="arcade"] .mp-chip .seat-badge{color:var(--daub-ink)}
  :root[data-theme="ebook"] .mp-chip .seat-badge{background:#000;color:#fff}
  /* 目前輪到的玩家:高對比 + 放大 + 脈動,一眼看出換誰 */
  .mp-chip.turn{background:var(--accent);color:#1c1008;border-color:var(--accent);transform:scale(1.04);
    font-size:15px;animation:turnpulse 1.2s ease-in-out infinite}
  .mp-chip.turn .dot{background:#1c1008}
  .mp-chip.turn .ln{color:#1c1008}
  .mp-chip.turn .seat-badge{background:#1c1008;color:var(--accent)}
  @keyframes turnpulse{0%,100%{box-shadow:0 0 0 2px var(--accent)}50%{box-shadow:0 0 0 2px var(--accent),0 0 16px var(--accent)}}
  :root[data-theme="ebook"] .mp-chip.turn{background:#000;color:#fff}
  :root[data-theme="ebook"] .mp-chip.turn .dot{background:#fff}
  :root[data-theme="ebook"] .mp-chip.turn .ln{color:#fff}
  :root[data-theme="ebook"] .mp-chip.turn .seat-badge{background:#fff;color:#000}
  .mp-play{
    width:min(92vw,520px);display:flex;align-items:center;gap:20px;flex-wrap:wrap;
    background:var(--panel);border:1px solid var(--panel-line);border-radius:16px;padding:14px 20px;
  }
  .mp-hud-item{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .mp-hud-item + .mp-hud-item{padding-left:20px;border-left:1px solid var(--panel-line)}
  .mp-ball{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;
    background:var(--daub);color:var(--daub-ink);font-family:'Fredoka';font-size:24px;font-weight:700;line-height:1;
    box-shadow:0 3px 10px rgba(0,0,0,.25)}
  .mp-goal-num{font-family:'Fredoka';font-weight:700;font-size:24px;line-height:1;color:var(--text)}
  .mp-turn{margin-left:auto;text-align:center;font-weight:800;font-size:15px;color:var(--accent);
    background:rgba(0,0,0,.16);padding:10px 16px;border-radius:999px}
  .mp-turn.wait{color:var(--muted)}
  :root[data-theme="ebook"] .mp-ball{box-shadow:none;border:1px solid #000}
  :root[data-theme="ebook"] .mp-turn{background:#fff;border:1px solid #000}
  .cell.callable{box-shadow:0 0 0 3px var(--accent) inset;cursor:pointer}
  .mp-panel{
    width:min(92vw,520px);background:var(--panel);border:1px solid var(--panel-line);
    border-radius:15px;padding:16px;
  }
  .mp-panel .subtitle{font-size:15px;margin-bottom:4px}
  .rps-hint{color:var(--muted);font-size:13px;margin:6px 0 12px}
  .rps-btns{display:flex;gap:10px;justify-content:center}
  .rps-btn{
    flex:1;max-width:110px;font-size:34px;padding:14px 0;background:rgba(255,255,255,.10);
    border:2px solid var(--panel-line);border-radius:16px;cursor:pointer;transition:transform .08s,border-color .12s;
  }
  .rps-btn:hover{transform:translateY(-2px)}
  .rps-btn:focus{outline:none}                                   /* 消除滑鼠點擊後殘留的外框 */
  .rps-btn:focus-visible{outline:3px solid var(--accent-2);outline-offset:2px}  /* 僅鍵盤操作時顯示 */
  .rps-btn.chosen{border-color:var(--accent);background:rgba(255,255,255,.20);transform:scale(1.06)}
  .rps-btns.locked{pointer-events:none}            /* 已出拳 → 不能再改 */
  .rps-btn.dim{opacity:.28;transform:none}          /* 出拳後把沒選的淡化,只留你選的 */
  .rps-throws{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;justify-content:center}
  /* 猜拳過場:揭曉大家出了什麼 */
  .reveal-hands{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:12px 0 14px}
  .reveal-hand{
    display:flex;flex-direction:column;align-items:center;gap:3px;min-width:86px;
    background:rgba(255,255,255,.10);border:2px solid var(--panel-line);border-radius:16px;
    padding:12px 14px 10px;opacity:0;transform:translateY(10px) scale(.85);
    animation:revealPop .38s cubic-bezier(.2,.9,.3,1.35) forwards;
  }
  .reveal-hand .emo{font-size:42px;line-height:1;margin-bottom:2px}
  .reveal-hand .rk{font-family:'Fredoka';font-weight:600;color:var(--accent);font-size:12.5px}
  .reveal-hand .nm{font-weight:800;font-size:14px;max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .reveal-hand .txt{color:var(--muted);font-size:11.5px;font-weight:700}
  .reveal-hand.win{border-color:var(--accent);background:rgba(255,255,255,.20)}
  .reveal-hand.win .nm{color:var(--accent)}          /* 贏家的名字用強調色,一眼認出 */
  .reveal-hand.tie{border-style:dashed;opacity:.92}  /* 平手揭曉:虛線框,表示還沒定案 */
  @keyframes revealPop{to{opacity:1;transform:none}}
  .reveal-order{text-align:center;font-weight:800;font-size:15px;margin-top:2px;line-height:1.5}
  /* 揭曉:先出號的贏家大字強調,清楚看見是誰 */
  .reveal-champ{font-weight:900;font-size:15px;line-height:1.35}
  .reveal-champ .nm{color:var(--accent);font-size:24px;font-weight:900;word-break:break-word}
  .reveal-seq{color:var(--muted);font-size:13px;font-weight:700;margin-top:6px}
  :root[data-theme="ebook"] .reveal-hand{background:#fff;border:2px solid #000}
  :root[data-theme="ebook"] .reveal-hand.win{background:#000;color:#fff}
  :root[data-theme="ebook"] .reveal-hand.win .rk,
  :root[data-theme="ebook"] .reveal-hand.win .nm,
  :root[data-theme="ebook"] .reveal-hand.win .txt{color:#fff}
  :root[data-theme="ebook"] .reveal-champ .nm{color:#000}
  .order-list{display:flex;flex-direction:column;gap:8px;margin:10px 0 14px}
  .order-item{
    display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.10);
    border:1px solid var(--panel-line);border-radius:12px;padding:8px 12px;font-weight:800;
  }
  .order-item .seat{font-family:'Fredoka';color:var(--accent);min-width:22px;text-align:center}
  .order-item .nm{flex:1}
  .order-item .mv{display:flex;gap:6px}
  .order-item .mv button{
    width:32px;height:32px;border-radius:9px;border:1px solid var(--panel-line);
    background:rgba(255,255,255,.12);color:var(--text);cursor:pointer;font-size:14px;
  }
  .order-item .mv button:disabled{opacity:.3;cursor:default}
  :root[data-theme="ebook"] .mp-input,
  :root[data-theme="ebook"] .mp-chip,
  :root[data-theme="ebook"] .mp-play{background:#fff;border:1px solid #000}
  :root[data-theme="ebook"] .mp-status,
  :root[data-theme="ebook"] .mp-chip .ln{color:#000}
  :root[data-theme="ebook"] .mp-chip.ready .dot{background:#000}
  :root[data-theme="ebook"] .mp-panel,
  :root[data-theme="ebook"] .rps-btn,
  :root[data-theme="ebook"] .order-item,
  :root[data-theme="ebook"] .order-item .mv button{background:#fff;border:1px solid #000}
  :root[data-theme="ebook"] .mp-turn,
  :root[data-theme="ebook"] .order-item .seat{color:#000}
  :root[data-theme="ebook"] .rps-btn.chosen{background:#000;color:#fff}
  :root[data-theme="ebook"] .cell.callable{box-shadow:0 0 0 3px #000 inset}
  /* ---------- 好友互動表情 ---------- */
  .emote-fab{
    position:fixed;right:18px;bottom:20px;z-index:56;width:56px;height:56px;border-radius:50%;
    border:1px solid var(--panel-line);background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#1c1008;font-size:28px;line-height:1;cursor:pointer;display:grid;place-items:center;
    box-shadow:0 6px 18px rgba(0,0,0,.32);transition:transform .12s}
  .emote-fab:hover{transform:translateY(-2px) scale(1.05)}
  .emote-fab:active{transform:scale(.94)}
  :root[data-theme="midnight"] .emote-fab,
  :root[data-theme="arcade"] .emote-fab{color:var(--daub-ink)}
  :root[data-theme="ebook"] .emote-fab{background:#fff;color:#000;border:1px solid #000;box-shadow:none}
  /* 連線中:底部預留淨空,讓右下浮動互動鈕落在最底排數字的下方,小螢幕才不會蓋到號碼 */
  body.mp-live{padding-bottom:96px}
  .emote-card{max-width:340px}
  .emote-to{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px}
  .emote-to-btn{border:1px solid var(--panel-line);background:rgba(255,255,255,.10);color:var(--text);
    border-radius:999px;padding:7px 13px;font-family:'Nunito';font-weight:800;font-size:13.5px;cursor:pointer;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:.12s}
  .emote-to-btn.on{background:var(--accent);color:#1c1008;border-color:var(--accent)}
  :root[data-theme="midnight"] .emote-to-btn.on,
  :root[data-theme="arcade"] .emote-to-btn.on{color:var(--daub-ink)}
  :root[data-theme="ebook"] .emote-to-btn{background:#fff;border:1px solid #000}
  :root[data-theme="ebook"] .emote-to-btn.on{background:#000;color:#fff}
  .emote-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .emote-btn{aspect-ratio:1;border:1px solid var(--panel-line);background:rgba(255,255,255,.08);
    border-radius:12px;font-size:26px;line-height:1;cursor:pointer;display:grid;place-items:center;transition:transform .1s,background .15s}
  .emote-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.18)}
  .emote-btn:active{transform:scale(.9)}
  :root[data-theme="ebook"] .emote-btn{background:#fff;border:1px solid #000}
  .emote-fly-layer{position:fixed;inset:0;pointer-events:none;z-index:64}
  .emote-fly{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;
    align-items:center;gap:3px;animation:emoteFloat 2.2s ease-out forwards}
  .emote-fly .ef-emo{font-size:46px;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
  .emote-fly .ef-cap{font-family:'Fredoka';font-weight:600;font-size:12px;color:#fff;white-space:nowrap;
    background:rgba(0,0,0,.5);padding:2px 9px;border-radius:999px}
  @keyframes emoteFloat{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}
    15%{opacity:1;transform:translate(-50%,-64%) scale(1.15)}
    32%{transform:translate(-50%,-74%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-165%) scale(1)}
  }
  :root[data-theme="ebook"] .emote-fly .ef-cap{background:#000}
  #toast{
    position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-14px);
    background:var(--daub);color:var(--daub-ink);font-family:'Fredoka';font-weight:600;
    padding:8px 18px;border-radius:999px;font-size:15px;z-index:70;
    opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
    box-shadow:0 6px 18px rgba(0,0,0,.25);
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  :root[data-theme="ebook"] #toast{background:#000;color:#fff;box-shadow:none;border:1px solid #000}
  footer{color:var(--muted);font-size:12px;margin-top:auto;padding-top:8px;opacity:.7}
  .ver{opacity:.6;letter-spacing:.03em}

  @media (prefers-reduced-motion:reduce){*{animation-duration:.001s!important;transition-duration:.05s!important}}
</style>
</head>
<body>

  <div class="topbar">
    <div class="marquee display" id="marquee" aria-label="BINGO 進度">
      <span class="bulb">B</span><span class="bulb">I</span><span class="bulb">N</span><span class="bulb">G</span><span class="bulb">O</span>
    </div>
    <div class="tools">
      <button class="icon-btn" id="fsBtn" title="全螢幕" aria-label="全螢幕切換">⛶</button>
      <button class="icon-btn" id="settingsBtn" title="設定" aria-label="設定">⚙️</button>
    </div>
  </div>

  <!-- ====== SETUP ====== -->
  <section class="panel" id="setup">
    <div class="subtitle">開始新的一局</div>

    <div class="field">
      <span class="field-label">填號方式</span>
      <div class="seg" id="fillSeg" role="tablist" aria-label="填號方式">
        <button class="on" data-fill="auto">🎲 自動填號</button>
        <button data-fill="manual">✏️ 手動填號</button>
      </div>
    </div>

    <div class="field" id="sizeRow">
      <span class="field-label">盤面大小</span>
      <div class="seg" id="sizeSeg" aria-label="盤面大小">
        <button class="on" data-size="5">5×5</button>
        <button data-size="6">6×6</button>
        <button data-size="7">7×7</button>
      </div>
    </div>
    <div class="field" id="targetRow">
      <span class="field-label">達成幾條線算贏</span>
      <div class="stepper-bar">
        <button class="mini" id="tMinus" aria-label="減少">−</button>
        <span class="target-val display" id="targetVal">5</span>
        <button class="mini" id="tPlus" aria-label="增加">＋</button>
      </div>
    </div>
    <div class="field hidden" id="mpOrderRow">
      <span class="field-label" id="orderLabel">出手順序由誰定</span>
      <div class="seg" id="orderSeg">
        <button data-order="host">👑 房主排</button>
        <button class="on" data-order="rps">✊ 猜拳</button>
        <button data-order="random">🎲 隨機</button>
      </div>
    </div>
  </section>

  <!-- ====== ONLINE: connect ====== -->
  <section class="panel hidden" id="mpConnect">
    <div class="mp-head">
      <button class="icon-btn" id="mpBack" title="回單機" aria-label="返回單機">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="subtitle">連線對戰</div>
    </div>
    <div class="field">
      <span class="field-label">你的暱稱</span>
      <input id="mpName" class="mp-input" maxlength="8" placeholder="玩家">
    </div>

    <div class="or-divider"><span>建立新房間</span></div>
    <div class="field">
      <input id="mpCreateCode" class="mp-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="指定房號(留空隨機)">
    </div>
    <button class="btn primary block-btn" id="mpCreate">＋ 建立房間</button>

    <div class="or-divider"><span>或 · 加入朋友的房間</span></div>
    <div class="field">
      <div class="input-wrap">
        <input id="mpCode" class="mp-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="房號">
        <button class="input-icon-btn" id="mpScan" title="掃描目前的房間" aria-label="掃描目前的房間">🔍</button>
      </div>
    </div>
    <button class="btn outline block-btn" id="mpJoin" disabled>加入房間 ▸</button>
    <div class="room-list" id="mpRoomList"></div>
    <div class="hint" id="mpConnMsg"></div>
  </section>

  <!-- ====== ONLINE: room banner ====== -->
  <div class="panel hidden" id="mpBar">
    <div class="row" style="margin-top:0;justify-content:space-between">
      <span class="label">房號 <b id="mpRoomCode" class="display" style="font-size:20px;letter-spacing:2px"></b></span>
      <span style="display:flex;align-items:center;gap:10px">
        <span class="mp-status" id="mpStatusTxt">等待中…</span>
        <button class="mini" id="mpLeaveBtn" title="離開房間" style="width:auto;padding:0 12px;font-size:13px">離開</button>
      </span>
    </div>
    <div id="mpPlayers" class="mp-players"></div>
  </div>

  <!-- ====== BOARD ====== -->
  <div class="board-wrap">

    <!-- online play HUD (顯示在棋盤上方) -->
    <div class="mp-play hidden" id="mpControls">
      <div class="mp-hud-item"><span class="lbl">最新號碼</span><span class="mp-ball display" id="mpLastNum">–</span></div>
      <div class="mp-hud-item"><span class="lbl">目標</span><span class="mp-goal-num display" id="mpGoalNum">5 線</span></div>
      <div class="mp-turn wait" id="mpTurn">等待開始…</div>
    </div>

    <!-- play status (單機,顯示在棋盤上方) -->
    <div class="status hidden" id="playStatus">
      <div><div class="lbl">已完成</div><div class="big"><span id="lineCount">0</span> 條線</div></div>
      <button class="icon-btn" id="exitBtn" title="退出這局" aria-label="退出這局，回到開始畫面">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
      </button>
      <div style="text-align:right"><div class="lbl">還差</div><div class="big"><span id="remain">5</span> 條贏</div></div>
    </div>

    <div class="grid" id="grid"></div>

    <!-- setup actions -->
    <div class="actions" id="setupActions">
      <button class="btn ghost" id="reshuffleBtn">🎲 換一組號碼</button>
      <button class="btn primary" id="startBtn">開始遊戲 ▸</button>
      <button class="btn ghost" id="onlineBtn">🌐 連線對戰</button>
      <button class="btn primary hidden" id="mpReadyBtn">準備好了 ✓</button>
      <button class="btn primary hidden" id="mpStartBtn">開始對戰 ▸</button>
    </div>

    <!-- online: host arranges turn order -->
    <div class="mp-panel hidden" id="mpOrderPanel">
      <div class="subtitle">安排出手順序</div>
      <div class="rps-hint" id="orderHint">用上下箭頭排好先後,然後開始。</div>
      <div class="order-list" id="orderList"></div>
      <div class="actions"><button class="btn primary hidden" id="orderConfirm">確定順序,開始 ▸</button></div>
    </div>
  </div>

  <footer><span class="ver">BINGO · v1.8.2</span></footer>

  <!-- online: 猜拳 / 揭曉 蓋板(像結束畫面那樣彈出,在這裡出拳、揭曉) -->
  <div class="veil" id="mpVeil">
    <div class="win-card mp-veil-card">
      <!-- 出拳 -->
      <div id="rpsContent">
        <div class="mp-veil-title">✊ 猜拳決定順序</div>
        <div class="rps-hint" id="rpsHint">出拳!贏的人先出號。</div>
        <div class="rps-btns" id="rpsBtns">
          <button class="rps-btn" data-rps="R" title="石頭">✊</button>
          <button class="rps-btn" data-rps="S" title="剪刀">✌️</button>
          <button class="rps-btn" data-rps="P" title="布">✋</button>
        </div>
        <div class="rps-throws" id="rpsThrows"></div>
      </div>
      <!-- 揭曉大家出了什麼 -->
      <div id="revealContent" class="hidden">
        <div class="mp-veil-title">✊ 猜拳結果</div>
        <div class="reveal-hands" id="revealList"></div>
        <div class="reveal-order" id="revealOrder"></div>
        <div class="rps-hint" id="revealHint"></div>
        <div class="actions"><button class="btn primary hidden" id="revealSkip">跳過 ⏭</button></div>
      </div>
      <!-- 逃生出口:猜拳卡住(有人一直不出拳)時,總是能離開 -->
      <button class="peek-link" id="mpVeilLeave">離開房間</button>
    </div>
  </div>

  <!-- win -->
  <div class="veil" id="veil">
    <div class="win-card">
      <div class="word display" id="winWord">BINGO!</div>
      <p id="winMsg">你完成了 5 條線 🎉</p>
      <div class="actions" id="spWinBtns">
        <button class="btn ghost" id="winRestart">再玩一次</button>
        <button class="btn primary" id="winNew">換新號碼</button>
      </div>
      <div class="actions hidden" id="mpWinBtns">
        <button class="btn primary" id="mpAgain">再一局</button>
        <button class="btn ghost" id="mpLeaveWin">離開房間</button>
      </div>
      <button class="peek-link" id="winPeek">先看看牌面 👀</button>
    </div>
  </div>
  <!-- 偷看牌面時,用這顆浮動鈕叫回結果卡 -->
  <button class="peek-reopen hidden" id="reopenWin">🏆 看結果</button>

  <!-- settings -->

<script>
