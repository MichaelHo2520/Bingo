<script>
(function(){
  "use strict";
  const THEMES=["sunset","midnight","bubblegum","meadow","arcade"];
  const THEME_NAMES={sunset:"落日",midnight:"午夜霓虹",bubblegum:"泡泡糖",meadow:"草原",arcade:"街機",ebook:"電子書"};
  const THEME_COLORS={sunset:["#ff8a3d","#ffd24a"],midnight:["#22e0ff","#ff4bd8"],bubblegum:["#ff4fa3","#9b6bff"],meadow:["#6cc04a","#ffcf47"],arcade:["#ffe600","#ff2d55"]};
  const $=id=>document.getElementById(id);
  const grid=$("grid");

  /* ---------- Board size (5/6/7) ---------- */
  let SIZE=5;                             // 目前盤面邊長(5×5 / 6×6 / 7×7)
  function nCells(){ return SIZE*SIZE; }  // 格子總數 = 號碼上限(1..nCells)
  function maxLines(){ return 2*SIZE+2; } // 可能連線總數(橫+直+2 斜)= 勝利線數上限
  // 依邊長算出所有連線(N 橫 + N 直 + 2 斜)的格子索引
  function buildLines(n){
    const L=[];
    for(let r=0;r<n;r++){ const a=[]; for(let c=0;c<n;c++)a.push(r*n+c); L.push(a); }
    for(let c=0;c<n;c++){ const a=[]; for(let r=0;r<n;r++)a.push(r*n+c); L.push(a); }
    const d1=[],d2=[]; for(let k=0;k<n;k++){ d1.push(k*n+k); d2.push(k*n+(n-1-k)); }
    L.push(d1,d2);
    return L;
  }
  let LINES=buildLines(SIZE);
  // 套用格線欄列數與字級(格子越多字越小);--cellfont 由 .cell 讀取
  function applyGridCols(){
    grid.style.gridTemplateColumns="repeat("+SIZE+",1fr)";
    grid.style.gridTemplateRows="repeat("+SIZE+",1fr)";
    const fonts={5:"clamp(20px,6.5vw,40px)",6:"clamp(17px,5.4vw,33px)",7:"clamp(15px,4.6vw,28px)"};
    grid.style.setProperty("--cellfont", fonts[SIZE]||fonts[5]);
  }
  function clampTarget(){ state.target=Math.min(maxLines(),Math.max(1,state.target)); const t=$("targetVal"); if(t)t.textContent=state.target; }
  function syncSizeSeg(){ const seg=$("sizeSeg"); if(!seg)return; [...seg.children].forEach(b=>b.classList.toggle("on", (+b.dataset.size)===SIZE)); }
  // 切換盤面大小:重算連線、重發卡片、重畫;連線時由房主寫入、訪客跟著套用
  function setSize(n){
    if(!(n>=5&&n<=7))return;
    SIZE=n; LINES=buildLines(n);
    state.card=(state.fill==="manual"&&state.mode==="setup") ? Array(nCells()).fill(0) : shuffled();
    state.marked=Array(nCells()).fill(false);
    applyGridCols(); clampTarget(); syncSizeSeg();
    render(); applyFillUI();
  }

  /* ---------- Sound (Web Audio, no files) ---------- */
  const Sound=(function(){
    let ctx=null, muted=false;
    function ac(){
      if(!ctx){const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return null; ctx=new AC();}
      if(ctx.state==="suspended")ctx.resume();
      return ctx;
    }
    function tone(freq,o){
      if(muted)return; const c=ac(); if(!c)return;
      o=o||{}; const type=o.type||"sine",dur=o.dur||0.12,vol=o.vol||0.2,delay=o.delay||0,slide=o.slideTo||null;
      const t=c.currentTime+delay;
      const osc=c.createOscillator(),g=c.createGain();
      osc.type=type; osc.frequency.setValueAtTime(freq,t);
      if(slide)osc.frequency.exponentialRampToValueAtTime(slide,t+dur);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(vol,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      osc.connect(g).connect(c.destination);
      osc.start(t); osc.stop(t+dur+0.03);
    }
    return {
      toggle(){muted=!muted; if(!muted)tone(660,{type:"triangle",dur:0.08,vol:0.15}); return muted;},
      setMuted(m){muted=!!m;},
      isMuted(){return muted;},
      wake(){ac();},
      place(){tone(520,{type:"triangle",dur:0.10,vol:0.18,slideTo:820});},
      takeback(){tone(500,{type:"triangle",dur:0.13,vol:0.15,slideTo:240});},
      mark(){tone(300,{type:"sine",dur:0.09,vol:0.28,slideTo:560}); tone(760,{type:"sine",dur:0.05,vol:0.10,delay:0.02});},
      unmark(){tone(360,{type:"sine",dur:0.08,vol:0.12,slideTo:210});},
      start(){[392,523,659].forEach((f,i)=>tone(f,{type:"triangle",dur:0.12,vol:0.16,delay:i*0.05}));},
      line(){[523,659,784].forEach((f,i)=>tone(f,{type:"triangle",dur:0.17,vol:0.18,delay:i*0.06}));},
      emote(){tone(880,{type:"sine",dur:0.09,vol:0.13,slideTo:1245});},
      win(){[523,659,784,1047].forEach((f,i)=>tone(f,{type:"triangle",dur:0.28,vol:0.22,delay:i*0.10})); tone(1568,{type:"sine",dur:0.5,vol:0.12,delay:0.46});}
    };
  })();

  let state={
    mode:"setup",        // setup | play
    fill:"auto",         // auto | manual
    target:5,
    card:shuffled(),     // nCells 個號碼 (手動模式未填為 0)
    marked:Array(nCells()).fill(false),
    lastLines:0,
    online:false,
    won:false
  };

  function shuffled(){
    const a=Array.from({length:nCells()},(_,i)=>i+1);
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }

  /* ---------- Rendering ---------- */
  function render(){
    grid.innerHTML="";
    const manual = state.mode==="setup" && state.fill==="manual";
    for(let i=0;i<nCells();i++){
      const cell=document.createElement("button");
      cell.className="cell";
      cell.dataset.i=i;
      const val=state.card[i];
      cell.innerHTML=`<span class="daub"></span><span class="num">${val?val:""}</span>`;

      if(state.mode==="play"){
        if(state.marked[i])cell.classList.add("marked");
        if(state.online){
          const called=MP.isCalled(val);
          if(MP.isMyTurn() && !called){ cell.classList.add("callable"); cell.style.cursor="pointer"; cell.addEventListener("click",()=>MP.tap(i)); }
          else { cell.disabled=true; cell.style.cursor="default"; }
        }
        else cell.addEventListener("click",()=>toggle(i));
        cell.setAttribute("aria-pressed",state.marked[i]?"true":"false");
      }else if(manual){
        if(!val)cell.classList.add("empty-cell");
        cell.addEventListener("click",()=>manualTap(i));
      }else{ // auto preview
        cell.disabled=true;cell.style.cursor="default";
      }
      grid.appendChild(cell);
    }
    if(state.mode==="play")refreshLines();
  }

  /* ---------- Manual: tap to place ---------- */
  function smallestMissing(){
    const used=new Set(state.card.filter(n=>n>0));
    for(let n=1;n<=nCells();n++) if(!used.has(n)) return n;
    return null;
  }
  function manualTap(i){
    const had=state.card[i]>0;
    if(had){                          // take back -> free just this number
      state.card[i]=0;
      Sound.takeback();
    }else{                            // place the smallest available number
      const n=smallestMissing();
      if(n==null)return;
      state.card[i]=n;
      Sound.place();
    }
    render();
    if(!had){                         // little pop on the newly placed cell
      grid.children[i].classList.add("just-placed");
    }
    updateManualUI();
  }
  function updateManualUI(){
    const filled=state.card.filter(n=>n>0).length, ok=filled===nCells();
    $("startBtn").disabled=!ok;
    $("startBtn").style.opacity=ok?"1":".5";
    if(state.online)MP.readyEnabled(ok);
  }

  /* ---------- Play ---------- */
  function toggle(i){
    if(state.won)return;
    state.marked[i]=!state.marked[i];
    state.marked[i]?Sound.mark():Sound.unmark();
    const cell=grid.children[i];
    cell.classList.toggle("marked",state.marked[i]);
    cell.setAttribute("aria-pressed",state.marked[i]?"true":"false");
    refreshLines();
  }

  function refreshLines(){
    const inLine=new Set();
    let done=0;
    LINES.forEach(line=>{
      if(line.every(idx=>state.marked[idx])){done++;line.forEach(idx=>inLine.add(idx));}
    });
    for(let i=0;i<nCells();i++)grid.children[i].classList.toggle("inline",inLine.has(i));

    $("lineCount").textContent=done;
    $("remain").textContent=Math.max(0,state.target-done);
    // marquee bulbs
    const bulbs=$("marquee").children;
    for(let k=0;k<5;k++)bulbs[k].classList.toggle("lit", k < Math.min(done,5));

    if(done>state.lastLines && done<state.target)Sound.line();
    state.lastLines=done;

    if(state.online){
      MP.reportLines(done);
      if(done>=state.target) MP.tryWin(done);
      return;
    }
    if(done>=state.target && !state.won){ state.won=true; win(done); }
  }

  /* ---------- Win ---------- */
  function win(done){
    Sound.win();
    $("winWord").textContent="BINGO!";
    $("winMsg").textContent=`你完成了 ${done} 條線 🎉`;
    $("spWinBtns").classList.remove("hidden");
    $("mpWinBtns").classList.add("hidden");
    showResult();
    burst();
  }
  // 叫出結果卡(順便收起「看結果」浮動鈕)
  function showResult(){ $("reopenWin").classList.add("hidden"); $("veil").classList.add("show"); }
  // 徹底收掉結果(重來/離開時用):卡片與浮動鈕都關
  function closeWin(){ $("veil").classList.remove("show"); $("reopenWin").classList.add("hidden"); }
  // 只把結果卡收起來看牌面,留一顆浮動鈕可再叫回結果
  function peekBoard(){ $("veil").classList.remove("show"); $("reopenWin").classList.remove("hidden"); }

  /* ---------- Mode switches ---------- */
  function toSetup(){
    state.mode="setup";state.won=false;closeWin();
    $("setup").classList.remove("hidden");
    $("setupActions").classList.remove("hidden");
    $("playStatus").classList.add("hidden");
    resetMarquee();
    render();
    applyFillUI();
  }
  function startGame(){
    if(state.fill==="manual" && state.card.some(n=>!n))return;
    state.mode="play";state.marked=Array(nCells()).fill(false);state.won=false;state.lastLines=0;
    Sound.start();
    $("setup").classList.add("hidden");
    $("setupActions").classList.add("hidden");
    $("playStatus").classList.remove("hidden");
    render();
  }
  function restart(){
    state.marked=Array(nCells()).fill(false);state.won=false;state.lastLines=0;closeWin();
    resetMarquee();render();
  }
  function resetMarquee(){[...$("marquee").children].forEach(b=>b.classList.remove("lit"));}

  function applyFillUI(){
    const manual=state.fill==="manual";
    $("reshuffleBtn").classList.toggle("hidden",manual);
    if(manual){ updateManualUI(); }
    else {
      $("startBtn").disabled=false;$("startBtn").style.opacity="1";
      if(state.online)MP.readyEnabled(true);
    }
  }

  /* ---------- Confetti ---------- */
  function burst(){
    if(document.documentElement.getAttribute("data-theme")==="ebook")return;
    const cv=$("confetti"),ctx=cv.getContext("2d");
    cv.width=innerWidth;cv.height=innerHeight;
    const cs=getComputedStyle(document.documentElement);
    const cols=[cs.getPropertyValue("--accent"),cs.getPropertyValue("--accent-2"),cs.getPropertyValue("--daub"),cs.getPropertyValue("--marquee")].map(s=>s.trim());
    const P=Array.from({length:140},()=>({
      x:innerWidth/2,y:innerHeight*.35,
      vx:(Math.random()-.5)*14,vy:Math.random()*-15-4,
      g:.35+Math.random()*.2,s:6+Math.random()*8,
      c:cols[Math.floor(Math.random()*cols.length)],
      r:Math.random()*6,vr:(Math.random()-.5)*.4
    }));
    let t=0;
    (function loop(){
      ctx.clearRect(0,0,cv.width,cv.height);t++;
      P.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;
        ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();});
      if(t<160)requestAnimationFrame(loop);else ctx.clearRect(0,0,cv.width,cv.height);
    })();
  }

  /* ---------- Theme & fullscreen ---------- */
  let lastColorTheme="sunset";
  const STORE_KEY="bingo.prefs.v1";
  function savePrefs(){
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify({
        theme:lastColorTheme,
        ebook:document.documentElement.getAttribute("data-theme")==="ebook",
        muted:Sound.isMuted(),
        target:state.target,
        size:SIZE
      }));
    }catch(e){/* storage unavailable -> just don't persist */}
  }
  function loadPrefs(){
    let p={}; try{ p=JSON.parse(localStorage.getItem(STORE_KEY))||{}; }catch(e){ p={}; }
    if(p.theme && THEMES.indexOf(p.theme)>=0){
      lastColorTheme=p.theme;
      document.documentElement.setAttribute("data-theme",p.theme);
    }
    if(typeof p.size==="number" && p.size>=5 && p.size<=7){ setSize(p.size); }
    if(typeof p.target==="number"){
      state.target=Math.min(maxLines(),Math.max(1,p.target));
      $("targetVal").textContent=state.target;
    }
    if(p.muted){ Sound.setMuted(true); }
    if(p.ebook){ setEbook(true,true); }
  }

  /* ---------- Settings sheet ---------- */
  function buildSwatches(){
    const box=$("swatches"); if(!box)return; box.innerHTML="";
    THEMES.forEach(name=>{
      const b=document.createElement("button");
      b.type="button"; b.className="swatch"; b.dataset.theme=name;
      b.title=THEME_NAMES[name]; b.setAttribute("aria-label",THEME_NAMES[name]);
      const c=THEME_COLORS[name]||["#888","#555"];
      b.style.background="linear-gradient(135deg,"+c[0]+","+c[1]+")";
      b.addEventListener("click",()=>setTheme(name));
      box.appendChild(b);
    });
  }
  function setTheme(name){
    if(THEMES.indexOf(name)<0)return;
    if(document.documentElement.getAttribute("data-theme")==="ebook")return;   // locked in e-book mode
    document.documentElement.setAttribute("data-theme",name);
    lastColorTheme=name;
    savePrefs();
    syncSettingsUI();
  }
  function syncSettingsUI(){
    const isEbook=document.documentElement.getAttribute("data-theme")==="ebook";
    const swE=$("swEbook"), swM=$("swMute"), sw=$("swatches");
    if(swE)swE.setAttribute("aria-checked",isEbook?"true":"false");
    if(swM)swM.setAttribute("aria-checked",Sound.isMuted()?"false":"true");   // on = 有聲音
    if(sw){
      sw.classList.toggle("locked",isEbook);
      const active=isEbook?lastColorTheme:document.documentElement.getAttribute("data-theme");
      [...sw.children].forEach(b=>b.classList.toggle("on",b.dataset.theme===active));
    }
  }
  function openSettings(){ Sound.wake(); syncSettingsUI(); $("setVeil").classList.add("show"); }
  function closeSettings(){ $("setVeil").classList.remove("show"); }

  function setEbook(on,silent){
    const root=document.documentElement;
    if(on){
      if(root.getAttribute("data-theme")!=="ebook")lastColorTheme=root.getAttribute("data-theme");
      root.setAttribute("data-theme","ebook");
    }else{
      root.setAttribute("data-theme",lastColorTheme);
    }
    if(!silent)showToast(on?"電子書模式":THEME_NAMES[lastColorTheme]);
    savePrefs();
    syncSettingsUI();
  }
  function toggleEbook(){ setEbook(document.documentElement.getAttribute("data-theme")!=="ebook"); }
  let toastT;
  function showToast(txt,dur){
    let el=$("toast");
    if(!el){el=document.createElement("div");el.id="toast";document.body.appendChild(el);}
    el.textContent=txt;
    el.classList.add("show");
    clearTimeout(toastT);
    toastT=setTimeout(()=>el.classList.remove("show"),dur||1100);
  }
  function toggleFull(){
    if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();}
    else{document.exitFullscreen&&document.exitFullscreen();}
  }

  /* ---------- 好友互動表情(連線用) ---------- */
  const EMOTES=["👍","❤️","😂","🎉","🔥","👏","😮","😢","😭","😎","🤯","😱","🥳","🤝","🙏","💪","😡","💩"];
  let emoteTarget="all";                       // 目前要傳給誰:"all" 或某玩家 id
  function openEmote(target){
    if(!state.online)return;
    const roster=MP.roster();
    emoteTarget = (target && target!=="all" && roster.some(p=>p.id===target)) ? target : "all";
    buildEmoteRecipients(); buildEmoteGrid();
    Sound.wake();
    $("emoteVeil").classList.add("show");
  }
  function closeEmote(){ const v=$("emoteVeil"); if(v)v.classList.remove("show"); }
  function buildEmoteRecipients(){
    const box=$("emoteTo"); if(!box)return; box.innerHTML="";
    const list=[{id:"all",name:"🌐 全部人"}].concat(MP.roster().filter(p=>!p.me).map(p=>({id:p.id,name:p.name})));
    if(!list.some(r=>r.id===emoteTarget)) emoteTarget="all";
    list.forEach(r=>{
      const b=document.createElement("button");
      b.type="button"; b.className="emote-to-btn"+(r.id===emoteTarget?" on":"");
      b.textContent=r.name;
      b.addEventListener("click",()=>{ emoteTarget=r.id; buildEmoteRecipients(); });
      box.appendChild(b);
    });
    const head=$("emoteHead");
    if(head) head.textContent = emoteTarget==="all" ? "傳給全部人" : "傳給 "+(MP.roster().find(p=>p.id===emoteTarget)||{}).name;
  }
  function buildEmoteGrid(){
    const g=$("emoteGrid"); if(!g)return; g.innerHTML="";
    EMOTES.forEach(em=>{
      const b=document.createElement("button");
      b.type="button"; b.className="emote-btn"; b.textContent=em;
      b.addEventListener("click",()=>{ MP.sendEmote(emoteTarget,em); closeEmote(); });
      g.appendChild(b);
    });
  }
  // 顯示一個飛起的表情:定位到目標玩家的晶片(找不到就畫面中央),下方標註誰傳給誰
  function showEmote(emoji,caption,anchorId){
    const layer=$("emoteFly"); if(!layer)return;
    let x=innerWidth/2, y=innerHeight*0.42;
    if(anchorId){
      const chip=$("mpPlayers")&&$("mpPlayers").querySelector('.mp-chip[data-id="'+anchorId+'"]');
      if(chip){ const r=chip.getBoundingClientRect(); x=r.left+r.width/2; y=r.top+r.height/2; }
    }
    x += (Math.random()-0.5)*36;   // 一點點抖動,避免連發完全重疊
    const el=document.createElement("div"); el.className="emote-fly";
    el.style.left=x+"px"; el.style.top=y+"px";
    el.innerHTML='<span class="ef-emo">'+esc(emoji)+'</span><span class="ef-cap">'+esc(caption)+'</span>';   // esc:防止對方送入惡意內容
    layer.appendChild(el);
    setTimeout(()=>{ el.remove(); },2300);   // 用 timeout 移除(電子書模式關動畫仍會清掉)
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  /* ---------- Multiplayer (Firebase) ---------- */
  const MP=(function(){
    let db=null, roomRef=null, code=null, meId=null, meName="玩家", isHost=false;
    let players={}, calledList=[], status="lobby", winner=null, ready=false;
    let orderMethod="rps", order=[], turnIndex=0, rps=null, curPhase="lobby", orderDraft=[];
    let sawPlayers=false;
    let sawMe=false;                        // 是否曾在名單看過自己(避免剛加入的空讀誤判成被踢)
    let hostId=null, sawHost=false;         // 房主 id / 是否曾看過有效房主(避免剛加入時誤判)
    let myWinAt=null, outcomeShown=false;   // 平手判定用:自己達標時的叫號數 / 結果是否已揭曉
    let abandoned=false;                    // 開打後對手都離開、只剩自己 → 本局作廢,不再繼續
    let orderAnnounced=false;               // 本局是否已公告過出手順序(猜拳結果)
    let revealData=null, revealTimer=null;  // 猜拳過場:大家出的拳 / 房主用的「揭曉後自動開打」計時器
    let tieTimer=null, tieSig="";           // 平手揭曉:房主用的「停留後自動重猜」計時器 / 避免重繪重播動畫
    let emotesReady=false;                   // 好友互動:是否已略過歷史 emotes(避免重播舊表情)
    const RPS_EMO={R:"✊",S:"✌️",P:"✋"}, RPS_TXT={R:"石頭",S:"剪刀",P:"布"};

    function available(){
      return !!(window.firebase && FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey.indexOf("PASTE")<0);
    }
    function init(){
      if(db)return true;
      if(!available())return false;
      try{
        if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
        db=firebase.database(); return true;
      }catch(e){ console.error(e); return false; }
    }
    function randomCode(){
      let s=""; for(let i=0;i<4;i++)s+=Math.floor(Math.random()*10);
      return s;
    }
    function pid(){
      let id; try{id=localStorage.getItem("bingo.pid");}catch(e){}
      if(!id){ id="p"+Math.random().toString(36).slice(2,9); try{localStorage.setItem("bingo.pid",id);}catch(e){} }
      return id;
    }
    function setMsg(t){ $("mpConnMsg").textContent=t||""; }
    function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
    // 顯示用名稱:沒填或重複的名字會加編號區分(玩家1、玩家2、KK1、KK2…);各端 players 的 key 序一致故結果一致
    function dispName(id){
      const raw=(players[id]&&players[id].name)||"玩家";
      const same=Object.keys(players).filter(x=>((players[x]&&players[x].name)||"玩家")===raw);
      return same.length<=1 ? raw : raw+(same.indexOf(id)+1);
    }

    function openConnect(){
      $("setup").classList.add("hidden");
      $("setupActions").classList.add("hidden");
      $("mpConnect").classList.remove("hidden");
      $("mpRoomList").innerHTML="";
      setMsg(available()?"":"⚠ 尚未設定 Firebase。請依說明建立免費專案並把設定貼進檔案,連線才會啟用。");
    }
    // 掃描伺服器上目前開著的房間,列出來給人選(讀 rooms 一次,不掛常駐監聽)
    function scanRooms(){
      if(!init()){ setMsg("尚未設定 Firebase,無法連線。"); return; }
      const box=$("mpRoomList"); if(!box)return;
      box.innerHTML='<div class="room-empty">掃描中…</div>';
      db.ref("rooms").once("value").then(s=>{
        const rooms=s.val()||{};
        const items=Object.keys(rooms).map(c=>{
          const r=rooms[c]||{};
          const ps=r.players||{};
          const hostName=(r.host&&ps[r.host]&&ps[r.host].name)||"";   // 房主名稱(取房主 id 對應的玩家名)
          return { code:c, status:r.status||"lobby", count:Object.keys(ps).length, host:hostName };
        }).filter(r=>r.count>0).sort((a,b)=>a.code.localeCompare(b.code));
        renderRoomList(items);
      }).catch(e=>{ box.innerHTML='<div class="room-empty">掃描失敗:'+esc(e.message)+'(可能是資料庫規則不允許列出房間,見說明)</div>'; });
    }
    function renderRoomList(items){
      const box=$("mpRoomList"); if(!box)return; box.innerHTML="";
      if(!items.length){ box.innerHTML='<div class="room-empty">目前沒有開著的房間,按「建立房間」開一個吧。</div>'; return; }
      items.forEach(r=>{
        const joinable=r.status==="lobby";
        const it=document.createElement("button");
        it.type="button"; it.className="room-item"+(joinable?"":" busy"); it.disabled=!joinable;
        const hostTag=r.host?'👑 '+esc(r.host)+' · ':'';
        it.innerHTML='<span class="rc">'+esc(r.code)+'</span><span class="meta">'+hostTag+'👥 '+r.count+' 人 · '+(joinable?"等待中":"遊戲中")+'</span>';
        if(joinable) it.addEventListener("click",()=>{ $("mpCode").value=r.code; join(r.code,$("mpName").value); });
        box.appendChild(it);
      });
    }
    function closeConnect(){
      $("mpConnect").classList.add("hidden");
      $("setup").classList.remove("hidden");
      $("setupActions").classList.remove("hidden");
    }

    function create(name,wantCode){
      if(!init()){ setMsg("尚未設定 Firebase,無法連線。"); return; }
      meName=(name||"玩家").slice(0,8); meId=pid(); isHost=true;
      const desired=(wantCode||"").replace(/\D/g,"").trim();       // 指定房號(可留空)
      if(desired && desired.length!==4){ setMsg("房號請輸入 4 位數字,或留空由系統隨機。"); return; }
      code = desired || randomCode();
      roomRef=db.ref("rooms/"+code);
      roomRef.child("host").once("value").then(snap=>{
        if(snap.exists()){
          if(desired){ setMsg("房號 "+desired+" 已被使用,換一個或留空隨機。"); throw "taken"; }
          code=randomCode(); roomRef=db.ref("rooms/"+code);        // 隨機模式才自動避開撞號
        }
        return roomRef.update({ host:meId, status:"lobby", target:state.target, size:SIZE, orderMethod:"rps",
          calledList:[], winner:null, order:null, turnIndex:0, rps:null, emotes:null, createdAt:Date.now() });
      }).then(()=>{ joinNode(); enterLobby(); }).catch(e=>{ if(e!=="taken") setMsg("建立房間失敗:"+((e&&e.message)||e)); });
    }
    function join(inCode,name){
      if(!init()){ setMsg("尚未設定 Firebase,無法連線。"); return; }
      const c=(inCode||"").replace(/\D/g,"").trim();
      if(c.length<4){ setMsg("請輸入完整房號(4 位數字)。"); return; }
      meName=(name||"玩家").slice(0,8); meId=pid(); isHost=false; code=c; roomRef=db.ref("rooms/"+code);
      roomRef.child("host").once("value").then(snap=>{
        if(!snap.exists()){ setMsg("找不到這個房間,請確認房號。"); return; }
        joinNode(); enterLobby();
      }).catch(e=>setMsg("加入失敗:"+e.message));
    }
    function joinNode(){
      const r=roomRef.child("players/"+meId);
      r.set({ name:meName, lines:0, ready:false });
      r.onDisconnect().remove();
      if(isHost) roomRef.onDisconnect().remove();   // 房主斷線/關頁 → 自動關閉整個房間
    }

    function hidePhasePanels(){
      hideMpVeil();
      $("mpOrderPanel").classList.add("hidden");
      $("mpControls").classList.add("hidden");
    }
    // 猜拳/揭曉蓋板(像結束畫面那樣彈出);which = "rps" | "reveal"
    function showMpVeil(which){
      $("rpsContent").classList.toggle("hidden", which!=="rps");
      $("revealContent").classList.toggle("hidden", which!=="reveal");
      const lv=$("mpVeilLeave"); if(lv) lv.textContent = isHost ? "取消猜拳,回大廳" : "離開房間";
      $("mpVeil").classList.add("show");
    }
    function hideMpVeil(){ $("mpVeil").classList.remove("show"); }
    // 猜拳卡住時的逃生:房主→取消回大廳(保留房間,大家可重來);訪客→離開房間回單機
    function bailFromRps(){ if(isHost) again(); else leave(); }
    function enterLobby(){
      state.online=true; ready=false; curPhase="lobby"; sawPlayers=false; sawMe=false; sawHost=false; hostId=null;
      $("mpConnect").classList.add("hidden");
      $("setup").classList.remove("hidden");
      $("setupActions").classList.remove("hidden");
      $("mpBar").classList.remove("hidden");
      $("mpRoomCode").textContent=code;
      $("startBtn").classList.add("hidden");
      $("onlineBtn").classList.add("hidden");
      $("mpReadyBtn").classList.remove("hidden");
      $("mpStartBtn").classList.add("hidden");
      hidePhasePanels();
      $("targetRow").style.display=isHost?"":"none";
      $("sizeRow").style.display=isHost?"":"none";       // 只有房主能改盤面大小
      syncOrderRow();                                     // 出手順序:大家都看得到目前選擇(訪客唯讀)
      $("emoteFab").classList.remove("hidden");           // 連線中顯示互動鈕
      document.body.classList.add("mp-live");             // 盤面底部預留空間,浮動鈕不蓋號碼
      state.fill="auto"; state.card=shuffled(); state.mode="setup";
      render(); applyFillUI(); updateReadyBtn();
      listen();
    }
    // 訪客:確認過房主與玩家名單後,若房主(或整個房間)消失 → 自動退出連線
    function hostGone(){
      return !isHost && state.online && sawHost && sawPlayers && (!hostId || !players[hostId]);
    }
    function kickIfHostGone(){
      if(hostGone()){ showToast("房主已離開,房間已關閉"); leave(); return true; }
      return false;
    }
    // 訪客:曾在名單看過自己、如今自己被移除 → 被房主踢出,退回單機
    function iWasKicked(){
      return !isHost && state.online && sawMe && !players[meId];
    }
    function kickIfKicked(){
      if(iWasKicked()){ showToast("你已被房主移出房間"); leave(); return true; }
      return false;
    }
    // 房主:把某位玩家移出房間(僅大廳階段,遊戲進行中不動出手順序)
    function kick(id){
      if(!isHost||!roomRef||id===meId)return;
      if(status!=="lobby"){ showToast("遊戲進行中無法移除玩家"); return; }
      const nm=dispName(id);
      roomRef.child("players/"+id).remove();
      showToast("已移出 "+nm);
    }
    function listen(){
      roomRef.child("host").on("value",s=>{
        hostId=s.val()||null; if(hostId)sawHost=true;
        kickIfHostGone();
      });
      roomRef.child("players").on("value",s=>{
        players=s.val()||{};
        if(Object.keys(players).length) sawPlayers=true;
        if(players[meId]) sawMe=true;
        if(kickIfHostGone()) return;
        if(kickIfKicked()) return;
        renderPlayers(); updateStartBtn();
        // 遊戲中(非大廳)其他人都離開、房主只剩自己 → 自動回大廳等待,保留房間開著(不卡在單人局,也不顯示結束卡)
        if(isHost && curPhase!=="lobby" && !winner && Object.keys(players).length<=1){ hostAloneToLobby(); return; }
        if(curPhase==="rps"){ renderRps(); if(isHost)rpsHostResolve(); }
        else if(curPhase==="ordering") renderOrderPanel();
        else if(curPhase==="playing"){
          if(isHost && order.length && !players[order[turnIndex]]) roomRef.child("turnIndex").set(nextTurn(turnIndex));
          updateTurnUI();
          if(winner) showOutcome();   // 補算平手(對手的 winAt 可能晚一步才傳到)
        }
      });
      roomRef.child("status").on("value",s=>{ status=s.val()||"lobby"; onStatus(); });
      roomRef.child("target").on("value",s=>{ const t=s.val(); if(typeof t==="number"&&!isHost){ state.target=t; $("targetVal").textContent=t; const g=$("mpGoalNum"); if(g)g.textContent=t+" 線"; } });
      // 盤面大小:房主寫入,訪客跟著套用(重發卡片;若已準備先取消準備讓其重填)
      roomRef.child("size").on("value",s=>{
        const n=s.val();
        if(typeof n!=="number"||n<5||n>7||isHost||n===SIZE)return;
        if(ready){ ready=false; roomRef.child("players/"+meId).update({ready:false}); updateReadyBtn(); }
        setSize(n);
        if(curPhase==="playing"){ state.marked=Array(nCells()).fill(false); applyCalledMarks(); updateTurnUI(); refreshLines(); }
        else setLock(false);
        syncSizeSeg();
      });
      // 好友互動表情:略過歷史(once value 於初始 child_added 之後才觸發),之後才顯示新的
      emotesReady=false;
      roomRef.child("emotes").on("child_added",s=>{ if(emotesReady)handleEmote(s.val()); });
      roomRef.child("emotes").once("value",()=>{ emotesReady=true; });
      roomRef.child("orderMethod").on("value",s=>{ orderMethod=s.val()||"host"; syncOrderSeg(); });
      roomRef.child("order").on("value",s=>{ order=s.val()||[]; if(curPhase==="playing"){ render(); updateTurnUI(); renderPlayers(); } maybeAnnounceOrder(); });
      roomRef.child("turnIndex").on("value",s=>{ turnIndex=s.val()||0; if(curPhase==="playing"){ render(); updateTurnUI(); renderPlayers(); } });
      roomRef.child("rps").on("value",s=>{ rps=s.val(); if(curPhase==="rps")renderRps(); if(isHost)rpsHostResolve(); });
      roomRef.child("reveal").on("value",s=>{ revealData=s.val(); if(curPhase==="reveal")renderReveal(); });
      roomRef.child("calledList").on("value",s=>{ calledList=s.val()||[]; onCalled(); });
      roomRef.child("winner").on("value",s=>{ winner=s.val(); if(winner)onWinner(); else closeWin(); });
    }

    function renderPlayers(){
      const box=$("mpPlayers"); if(!box)return; box.innerHTML="";
      const ids=Object.keys(players);
      ids.forEach(id=>{
        const p=players[id]||{};
        const isTurn=status==="playing"&&order.length>0&&order[turnIndex]===id;
        const chip=document.createElement("div");
        chip.className="mp-chip clickable"+(p.ready?" ready":"")+(id===meId?" me":"")+(isTurn?" turn":"");
        chip.dataset.id=id;                                  // 供表情動畫定位到該玩家晶片
        chip.title="點一下傳送互動表情";
        chip.addEventListener("click",()=>openEmote(id===meId?"all":id));   // 點對象 → 開表情面板
        const seatIdx=order.indexOf(id);
        const seatBadge=(status==="playing"&&seatIdx>=0)?'<span class="seat-badge">'+(seatIdx+1)+'</span>':'';
        const nameHtml=esc(dispName(id))+(id===meId?'(你)':'');
        chip.innerHTML='<span class="dot"></span>'+seatBadge+'<span>'+nameHtml+'</span>'+
          (status==="playing"?'<span class="ln">'+(p.lines||0)+'線</span>':'');
        if(isHost && status==="lobby" && id!==meId){
          const k=document.createElement("button");
          k.type="button"; k.className="mp-kick"; k.title="移出房間";
          k.setAttribute("aria-label","移出 "+dispName(id));
          k.innerHTML='<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
          k.addEventListener("click",ev=>{ ev.stopPropagation(); kick(id); });
          chip.appendChild(k);
        }
        box.appendChild(chip);
      });
      $("mpStatusTxt").textContent = status==="playing" ? "遊戲進行中" : (status==="rps"?"猜拳決定順序…":(status==="reveal"?"猜拳結果揭曉…":(status==="ordering"?"排定順序中…":(ids.length<2?"等待對手加入…":"等待大家準備…"))));
    }
    function updateReadyBtn(){
      const b=$("mpReadyBtn");
      b.textContent=ready?"取消準備":"準備好了 ✓";
      b.classList.toggle("ghost",ready); b.classList.toggle("primary",!ready);
    }
    function setLock(lock){
      $("reshuffleBtn").disabled=lock;
      $("fillSeg").style.pointerEvents=lock?"none":"";
      grid.style.pointerEvents=lock?"none":"";
    }
    function toggleReady(){
      if(!ready){
        if(state.card.some(n=>!n)){ showToast("卡片還沒填滿"); return; }
        ready=true; roomRef.child("players/"+meId).update({ ready:true, name:meName }); setLock(true);
      }else{
        ready=false; roomRef.child("players/"+meId).update({ ready:false }); setLock(false);
      }
      updateReadyBtn();
    }
    function updateStartBtn(){
      if(!isHost){ $("mpStartBtn").classList.add("hidden"); return; }
      const ids=Object.keys(players);
      const allReady=ids.length>=2 && ids.every(id=>players[id].ready);
      $("mpStartBtn").classList.toggle("hidden", status!=="lobby" || !allReady);
    }
    function setTarget(t){ if(isHost&&roomRef)roomRef.child("target").set(t); }
    function setOrderMethod(m){ if(isHost&&roomRef){ orderMethod=m; roomRef.child("orderMethod").set(m); syncOrderSeg(); } }
    function syncOrderSeg(){ const seg=$("orderSeg"); if(!seg)return; [...seg.children].forEach(b=>b.classList.toggle("on", b.dataset.order===orderMethod)); }
    // 大廳:出手順序讓所有人都看得到(房主可改,訪客唯讀)
    function syncOrderRow(){
      $("mpOrderRow").classList.remove("hidden");
      $("orderSeg").classList.toggle("readonly", !isHost);
      const lb=$("orderLabel"); if(lb)lb.textContent = isHost ? "出手順序由誰定" : "出手順序(房主決定)";
      syncOrderSeg();
    }
    function startGame(){
      if(!isHost)return;
      const ids=Object.keys(players);
      if(ids.length<2 || !ids.every(id=>players[id].ready)){ showToast("需要 2 人以上且全部準備好"); return; }
      const base={ target:state.target, calledList:[], winner:null, turnIndex:0, reveal:null };
      Object.keys(players).forEach(id=>{ base["players/"+id+"/winAt"]=null; });   // 清掉上一局的達標紀錄
      if(orderMethod==="rps"){
        roomRef.update({ ...base, status:"rps", order:null, rps:{ seq:1, groups:[ids.join(",")], throws:null } });
      }else if(orderMethod==="random"){
        const ord=ids.slice();
        for(let i=ord.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=ord[i]; ord[i]=ord[j]; ord[j]=t; }
        roomRef.update({ ...base, status:"playing", order:ord, rps:null });   // 隨機洗好順序,直接開打
      }else{
        roomRef.update({ ...base, status:"ordering", order:null, rps:null });
      }
    }

    /* ----- phase dispatch ----- */
    function onStatus(){
      renderPlayers();
      if(status==="playing"){ if(curPhase!=="playing") enterPlaying(); else updateTurnUI(); }
      else if(status==="rps"){ if(curPhase!=="rps") enterRps(); else renderRps(); }
      else if(status==="reveal"){ if(curPhase!=="reveal") enterReveal(); else renderReveal(); }
      else if(status==="ordering"){ if(curPhase!=="ordering") enterOrdering(); else renderOrderPanel(); }
      else { if(curPhase!=="lobby") backToLobby(); }
      curPhase=status;
    }

    /* ----- rock-paper-scissors: decide turn order ----- */
    function beats(a,b){ return (a==="R"&&b==="S")||(a==="S"&&b==="P")||(a==="P"&&b==="R"); }
    function myGroup(){
      const gs=(rps&&rps.groups)||[];
      for(const g of gs){ const m=String(g).split(","); if(m.indexOf(meId)>=0) return m; }
      return null;
    }
    function enterRps(){
      state.mode="setup";
      $("setup").classList.add("hidden"); $("setupActions").classList.add("hidden");
      $("mpOrderRow").classList.add("hidden");
      $("mpControls").classList.add("hidden"); $("mpOrderPanel").classList.add("hidden");
      showMpVeil("rps");
      setLock(true);
      tieSig="";
      renderRps();
    }
    function renderRps(){
      const gs=(rps&&rps.groups)||[];
      const seq=(rps&&rps.seq)||1;
      const throws=(rps&&rps.throws)||{};
      const mg=myGroup();
      // 平手揭曉:停留一下,讓大家看清楚剛剛是平手(保留這輪的出拳),之後房主自動帶進下一輪
      if(rps&&rps.tie){ renderRpsTie(gs,seq,throws,mg); return; }
      const mine=!!(throws[meId]&&throws[meId].s===seq);   // 需為布林:classList.toggle 收到 undefined 會「翻轉」而非設定,平手重猜時會亂亮
      const inGroup = mg && mg.length>1;               // 你在還要比大小的組裡
      const btns=$("rpsBtns");
      btns.style.display = inGroup ? "" : "none";        // 出拳前後都顯示(讓你選的那個留著)
      btns.classList.toggle("locked", !!mine);           // 已出拳 → 鎖住不能再改
      let hint;
      if(!inGroup) hint="你的順序已定,等其他人猜完…";
      else if(mine) hint="你出了 "+RPS_EMO[throws[meId].c]+" "+RPS_TXT[throws[meId].c]+",等待其他人…";
      else hint="出拳!(和你平手的人一起比大小)";
      $("rpsHint").textContent=hint;
      [...btns.children].forEach(b=>{
        const isChosen = mine && throws[meId].c===b.dataset.rps;
        b.classList.toggle("chosen", isChosen);
        b.classList.toggle("dim", !!mine && !isChosen);  // 出拳後淡化沒選的,只留你選的
      });
      const box=$("rpsThrows"); box.innerHTML="";
      gs.map(g=>String(g).split(",")).filter(m=>m.length>1).reduce((a,m)=>a.concat(m),[]).filter(id=>players[id]).forEach(id=>{
        const done=throws[id]&&throws[id].s===seq;
        const chip=document.createElement("div"); chip.className="mp-chip"+(done?" ready":"");
        // 只顯示「是否已出拳」,絕不透露對方出的拳(避免後出的人偷看)
        chip.innerHTML='<span class="dot"></span><span>'+esc(dispName(id))+'</span><span class="ln">'+(done?"已出拳":"等待中")+'</span>';
        box.appendChild(chip);
      });
    }
    // 平手揭曉:把這一輪還在比大小的人各出了什麼攤開來,標明平手,停留一下再重猜
    function renderRpsTie(gs,seq,throws,mg){
      const inGroup = mg && mg.length>1;
      $("rpsBtns").style.display="none";
      $("rpsHint").textContent = inGroup ? "🤝 平手!再猜一次…" : "還有人平手,再猜一次…";
      const ids=gs.map(g=>String(g).split(",")).filter(m=>m.length>1)
        .reduce((a,m)=>a.concat(m),[]).filter(id=>players[id]);
      const sig="tie:"+seq+"|"+ids.map(id=>id+":"+((throws[id]&&throws[id].c)||"")).join(",");
      if(sig===tieSig) return;   // 內容沒變就不重繪,避免動畫重播
      tieSig=sig;
      const box=$("rpsThrows"); box.innerHTML="";
      ids.forEach((id,idx)=>{
        const c=(throws[id]&&throws[id].s===seq)?throws[id].c:null;
        const it=document.createElement("div");
        it.className="reveal-hand tie";
        it.style.animationDelay=(idx*0.08)+"s";
        it.innerHTML='<span class="emo">'+(RPS_EMO[c]||"❔")+'</span>'+
          '<span class="nm">'+esc(dispName(id))+(id===meId?"(你)":"")+'</span>'+
          '<span class="txt">'+(RPS_TXT[c]||"")+'</span>';
        box.appendChild(it);
      });
    }
    function throwRps(c){
      if(!rps||curPhase!=="rps"||rps.tie)return;
      const mg=myGroup(); if(!mg||mg.length<=1)return;
      const seq=rps.seq||1;
      roomRef.child("rps/throws/"+meId).set({ c:c, s:seq });
    }
    function rpsHostResolve(){
      if(!isHost||!rps||status!=="rps")return;
      if(rps.tie)return;                 // 平手揭曉中,等房主的計時器帶進下一輪,先不判定
      const seq=rps.seq||1;
      const throws=rps.throws||{};
      let groups=(rps.groups||[]).map(g=>String(g).split(",").filter(id=>players[id])).filter(g=>g.length>0);
      const pending=groups.filter(g=>g.length>1).reduce((a,g)=>a.concat(g),[]);
      if(pending.length===0){
        roomRef.update({ order:groups.reduce((a,g)=>a.concat(g),[]), turnIndex:0, status:"playing", rps:null });
        return;
      }
      if(!pending.every(id=>throws[id]&&throws[id].s===seq))return;
      // 累積每位玩家「最後出的拳」,供最後過場揭曉(第一輪為全體同組,故人人都有紀錄)
      const acc=Object.assign({}, (rps.reveal||{}));
      pending.forEach(id=>{ acc[id]=throws[id].c; });
      const newGroups=[];
      groups.forEach(g=>{
        if(g.length<=1){ newGroups.push(g); return; }
        const wins={};
        g.forEach(x=>{ wins[x]=g.filter(y=>y!==x && beats(throws[x].c, throws[y].c)).length; });
        const sorted=[...g].sort((a,b)=>wins[b]-wins[a]);
        let cur=[], curWin=null;
        sorted.forEach(x=>{ if(curWin===null||wins[x]===curWin){ cur.push(x); curWin=wins[x]; } else { newGroups.push(cur); cur=[x]; curWin=wins[x]; } });
        if(cur.length)newGroups.push(cur);
      });
      if(newGroups.some(g=>g.length>1)){
        // 還有平手 → 先揭曉這一輪(讓大家看清楚是平手),停留約 2 秒再重猜(保留已累積的出拳紀錄)
        if(tieTimer)return;                              // 已排程過就不重複
        const nextGroups=newGroups.map(g=>g.join(","));
        // 先把分組結果寫進去(已定案的人變單獨一組),並保留 throws/seq 讓平手的人看到彼此出了什麼
        roomRef.update({ "rps/groups":nextGroups, "rps/tie":true });
        tieTimer=setTimeout(()=>{
          tieTimer=null;
          roomRef.update({ "rps/seq":seq+1, "rps/throws":null, "rps/reveal":acc, "rps/tie":null });
        }, 2000);
      }else{
        // 定案 → 先進入過場揭曉(帶著大家的出拳與最終順序),再由房主自動開打
        const finalOrder=newGroups.reduce((a,g)=>a.concat(g),[]);
        roomRef.update({ status:"reveal", order:finalOrder, turnIndex:0, rps:null, reveal:{ throws:acc, order:finalOrder } });
      }
    }

    /* ----- reveal: 猜拳過場,揭曉大家出了什麼 ----- */
    function enterReveal(){
      state.mode="setup";
      $("setup").classList.add("hidden"); $("setupActions").classList.add("hidden");
      $("mpOrderRow").classList.add("hidden");
      $("mpControls").classList.add("hidden"); $("mpOrderPanel").classList.add("hidden");
      showMpVeil("reveal");
      setLock(true);
      revealSig="";   // 每局重繪,確保揭曉動畫重播
      renderReveal();
      if(isHost) scheduleRevealAdvance();   // 房主:停留約 3 秒後自動開打(也可按「繼續」提早)
    }
    let revealSig="";
    function renderReveal(){
      const rv=revealData||{};
      const throws=rv.throws||{};
      const ord=(rv.order&&rv.order.length?rv.order:order)||[];
      const ids=ord.filter(id=>players[id]||throws[id]);
      if(ids.length && !ids.some(id=>throws[id])) return;   // 出拳資料還沒同步到,先不畫(避免閃現❔)
      const sig=ids.map(id=>id+":"+(throws[id]||"")).join("|");
      if(sig===revealSig) return;   // 內容沒變就不重繪(避免動畫重播)
      revealSig=sig;
      const box=$("revealList"); if(!box)return; box.innerHTML="";
      ids.forEach((id,idx)=>{
        const c=throws[id];
        const it=document.createElement("div");
        it.className="reveal-hand"+(idx===0?" win":"");
        it.style.animationDelay=(idx*0.12)+"s";
        it.innerHTML='<span class="rk">'+(idx+1)+'</span>'+
          '<span class="emo">'+(RPS_EMO[c]||"❔")+'</span>'+
          '<span class="nm">'+esc(dispName(id))+(id===meId?"(你)":"")+'</span>'+
          '<span class="txt">'+(RPS_TXT[c]||"")+'</span>';
        box.appendChild(it);
      });
      const oe=$("revealOrder");
      if(oe){
        const champ=ids[0];   // 排第一 = 贏家,先出號 → 用大字強調,一眼看清是誰
        let html='<div class="reveal-champ">🏆 <span class="nm">'+esc(dispName(champ))+(champ===meId?"(你)":"")+'</span> 先出號!</div>';
        if(ids.length>2) html+='<div class="reveal-seq">出手順序:'+ids.map(id=>esc(dispName(id))).join(" → ")+'</div>';
        oe.innerHTML=html;
      }
      // 「跳過」鈕:所有人都看得到、都能按(用來快速跳過揭曉畫面);沒按也會自動開打
      const btn=$("revealSkip"); if(btn) btn.classList.remove("hidden");
      const rh=$("revealHint"); if(rh) rh.textContent = "3 秒後自動開始,或按下方跳過";
    }
    function scheduleRevealAdvance(){
      if(!isHost || revealTimer) return;               // 自動計時只由房主掛一個,避免多人重複寫
      revealTimer=setTimeout(()=>{ revealTimer=null; revealSkip(); }, 3000);
    }
    // 揭曉 → 開打:自動計時(房主)或任一人按「跳過」都走這裡,把整局推進到開打
    function revealSkip(){
      if(status!=="reveal" || !roomRef) return;
      if(revealTimer){ clearTimeout(revealTimer); revealTimer=null; }
      roomRef.update({ status:"playing", reveal:null });
    }

    /* ----- host manual ordering ----- */
    function enterOrdering(){
      $("setup").classList.add("hidden"); $("setupActions").classList.add("hidden");
      $("mpOrderRow").classList.add("hidden");
      $("mpControls").classList.add("hidden"); hideMpVeil();
      $("mpOrderPanel").classList.remove("hidden");
      setLock(true);
      orderDraft=Object.keys(players);
      renderOrderPanel();
    }
    function renderOrderPanel(){
      $("orderConfirm").classList.toggle("hidden", !isHost);
      $("orderHint").textContent=isHost ? "用上下箭頭排好先後,然後開始。" : "房主正在安排出手順序…";
      const list=$("orderList"); if(!list)return; list.innerHTML="";
      let arr = isHost ? orderDraft.filter(id=>players[id]) : Object.keys(players);
      if(isHost) orderDraft=arr;
      arr.forEach((id,idx)=>{
        const it=document.createElement("div"); it.className="order-item";
        it.innerHTML='<span class="seat">'+(idx+1)+'</span><span class="nm">'+esc(dispName(id))+(id===meId?"(你)":"")+'</span>';
        if(isHost){
          const mv=document.createElement("span"); mv.className="mv";
          const up=document.createElement("button"); up.textContent="▲"; up.disabled=idx===0; up.addEventListener("click",()=>moveOrder(idx,-1));
          const dn=document.createElement("button"); dn.textContent="▼"; dn.disabled=idx===arr.length-1; dn.addEventListener("click",()=>moveOrder(idx,1));
          mv.appendChild(up); mv.appendChild(dn); it.appendChild(mv);
        }
        list.appendChild(it);
      });
    }
    function moveOrder(idx,d){
      const a=orderDraft.filter(id=>players[id]); const j=idx+d;
      if(j<0||j>=a.length)return;
      const t=a[idx]; a[idx]=a[j]; a[j]=t; orderDraft=a; renderOrderPanel();
    }
    function confirmOrder(){
      if(!isHost)return;
      const ord=orderDraft.filter(id=>players[id]);
      if(ord.length<2){ showToast("人數不足"); return; }
      roomRef.update({ order:ord, turnIndex:0, status:"playing" });
    }

    /* ----- playing (turn-based manual call) ----- */
    function enterPlaying(){
      state.mode="play"; state.won=false; state.lastLines=0; state.marked=Array(nCells()).fill(false);
      myWinAt=null; outcomeShown=false; orderAnnounced=false; abandoned=false;
      $("setup").classList.add("hidden"); $("setupActions").classList.add("hidden");
      $("playStatus").classList.add("hidden");
      hideMpVeil(); $("mpOrderPanel").classList.add("hidden");
      $("mpOrderRow").classList.add("hidden");
      $("mpControls").classList.remove("hidden");
      const g=$("mpGoalNum"); if(g)g.textContent=state.target+" 線";
      setLock(false);
      resetMarquee(); render(); applyCalledMarks(); updateTurnUI(); refreshLines();
      maybeAnnounceOrder();
    }
    // 猜拳/排序定案後,公告一次出手順序(讓大家知道猜拳誰贏誰輸);order 可能比 status 晚到,故用旗標確保只公告一次
    function maybeAnnounceOrder(){
      if(orderAnnounced || !order.length || status!=="playing") return;
      orderAnnounced=true;
      if(orderMethod==="rps") return;   // 猜拳已用過場揭曉,不再跳 toast 重複公告
      const nm=id=>dispName(id);
      let msg;
      if(orderMethod==="random"){
        msg = "🎲 隨機順序:"+order.map(nm).join(" → ");
      }else{
        msg = "出手順序:"+order.map(nm).join(" → ");
      }
      showToast(msg, 3200);
    }
    function isMyTurn(){ return status==="playing" && !winner && !abandoned && order.length>0 && order[turnIndex]===meId; }
    function isCalled(v){ return calledList.indexOf(v)>=0; }
    function nextTurn(from){
      if(!order.length)return from;
      let i=from;
      for(let k=0;k<order.length;k++){ i=(i+1)%order.length; if(players[order[i]])return i; }
      return from;
    }
    function updateTurnUI(){
      const el=$("mpTurn"); if(!el)return;
      if(status!=="playing"){ el.textContent="等待開始…"; el.classList.add("wait"); return; }
      const p=order[turnIndex];
      if(!p){ el.textContent="—"; el.classList.add("wait"); return; }
      if(p===meId){ el.textContent="👉 換你出號!"; el.classList.remove("wait"); }
      else { el.textContent="輪到 "+dispName(p); el.classList.add("wait"); }
    }
    function tap(i){
      if(!isMyTurn()){ showToast("還沒輪到你"); return; }
      const n=state.card[i]; if(!n)return;
      if(isCalled(n))return;
      Sound.place();
      roomRef.update({ calledList:calledList.concat(n), turnIndex:nextTurn(turnIndex) });
    }
    function onCalled(){
      const last=calledList[calledList.length-1];
      $("mpLastNum").textContent=last?last:"–";
      if(state.mode==="play"){
        const prev=state.marked.slice();
        applyCalledMarks();
        if(state.marked.some((m,i)=>m&&!prev[i]))Sound.mark();
        render(); updateTurnUI();
      }
    }
    function applyCalledMarks(){
      const set=new Set(calledList);
      for(let i=0;i<nCells();i++){
        state.marked[i]=set.has(state.card[i]);
        if(grid.children[i])grid.children[i].classList.toggle("marked",state.marked[i]);
      }
    }
    function reportLines(done){ if(roomRef&&meId)roomRef.child("players/"+meId+"/lines").set(done); }
    function tryWin(done){
      if(!roomRef)return;
      // 記錄「自己在第幾次叫號時達標」;同一次叫號同時達標 = 平手(見 showOutcome)
      if(myWinAt===null){ myWinAt=calledList.length; if(meId)roomRef.child("players/"+meId+"/winAt").set(myWinAt); }
      roomRef.child("winner").transaction(w=> w || { id:meId, name:meName, lines:done, at:myWinAt });
    }

    function onWinner(){ if(winner) showOutcome(); }
    // 揭曉結果:比較各玩家達標時的叫號數(winAt),最早者贏;若最早者不只一人 = 平手
    function showOutcome(){
      if(!winner)return;
      const withAt=Object.keys(players).filter(id=>players[id]&&typeof players[id].winAt==="number");
      let finalists, at;
      if(withAt.length){
        at=Math.min.apply(null, withAt.map(id=>players[id].winAt));
        finalists=withAt.filter(id=>players[id].winAt===at);
      }else{
        finalists=[winner.id];
      }
      const isDraw=finalists.length>1;
      const lines=(winner&&winner.lines)||state.target;

      $("spWinBtns").classList.add("hidden");
      $("mpWinBtns").classList.remove("hidden");
      $("mpAgain").style.display=isHost?"":"none";
      showResult();

      if(isDraw){
        const names=finalists.map(id=>dispName(id));
        const mineTie=finalists.indexOf(meId)>=0;
        $("winWord").textContent="平手!";
        $("winMsg").textContent=names.join("、")+" 同時完成 "+lines+" 條線,平手!";
        if(!outcomeShown){ Sound.win(); if(mineTie)burst(); }
      }else{
        const wid=finalists[0], mine=wid===meId;
        if(mine){
          $("winWord").textContent="你贏了!";
          $("winMsg").textContent="你最先完成 "+lines+" 條線 🎉";
        }else{
          $("winWord").textContent="你輸了";
          $("winMsg").textContent=dispName(wid)+" 先完成了 "+lines+" 條線";
        }
        if(!outcomeShown && mine){ Sound.win(); burst(); }
      }
      outcomeShown=true;
      render();
    }
    // 遊戲中其他人都離開、房主只剩自己:自動回大廳等待(保留房間開著讓人重新加入),不卡在單人局
    function hostAloneToLobby(){
      if(curPhase==="lobby")return;
      showToast("其他玩家都離開了,回到等待…", 2600);
      again();   // 清掉本局狀態、回大廳、重置準備;房主仍在房內,房號不變,可繼續等人加入
    }
    function again(){
      if(!isHost)return;
      const ups={ status:"lobby", calledList:[], winner:null, order:null, turnIndex:0, rps:null, reveal:null, emotes:null };
      Object.keys(players).forEach(id=>{ ups["players/"+id+"/lines"]=0; ups["players/"+id+"/ready"]=false; ups["players/"+id+"/winAt"]=null; });
      roomRef.update(ups);
      backToLobby();
    }
    function backToLobby(){
      ready=false; state.mode="setup"; state.won=false; state.fill="auto"; state.card=shuffled(); curPhase="lobby";
      order=[]; turnIndex=0; rps=null; myWinAt=null; outcomeShown=false; abandoned=false;
      revealData=null; revealSig=""; if(revealTimer){ clearTimeout(revealTimer); revealTimer=null; }
      tieSig=""; if(tieTimer){ clearTimeout(tieTimer); tieTimer=null; }
      closeWin();
      $("setup").classList.remove("hidden");
      $("setupActions").classList.remove("hidden");
      hidePhasePanels();
      $("startBtn").classList.add("hidden");
      $("onlineBtn").classList.add("hidden");
      $("mpReadyBtn").classList.remove("hidden");
      syncOrderRow();
      setLock(false); updateReadyBtn(); render(); applyFillUI();
    }
    function leave(){
      try{
        if(roomRef){
          ["host","players","status","target","size","orderMethod","order","turnIndex","rps","reveal","calledList","winner","emotes"].forEach(k=>roomRef.child(k).off());
          if(isHost){
            roomRef.onDisconnect().cancel();
            roomRef.remove();                       // 房主離開 → 關閉整個房間
          }else if(meId){
            const pr=roomRef.child("players/"+meId);
            pr.onDisconnect().cancel();
            pr.remove();
          }
        }
      }catch(e){}
      sawPlayers=false; sawMe=false; sawHost=false; hostId=null;
      roomRef=null; code=null; state.online=false; ready=false; winner=null; status="lobby"; players={}; calledList=[];
      order=[]; turnIndex=0; rps=null; curPhase="lobby"; myWinAt=null; outcomeShown=false; abandoned=false;
      revealData=null; revealSig=""; if(revealTimer){ clearTimeout(revealTimer); revealTimer=null; }
      tieSig=""; if(tieTimer){ clearTimeout(tieTimer); tieTimer=null; }
      emotesReady=false; closeEmote();
      closeWin();
      $("mpBar").classList.add("hidden");
      hidePhasePanels();
      $("mpReadyBtn").classList.add("hidden");
      $("mpStartBtn").classList.add("hidden");
      $("mpConnect").classList.add("hidden");
      $("mpOrderRow").classList.add("hidden");
      $("emoteFab").classList.add("hidden");
      document.body.classList.remove("mp-live");          // 離開連線,取消底部預留
      $("startBtn").classList.remove("hidden");
      $("onlineBtn").classList.remove("hidden");
      $("targetRow").style.display="";
      $("sizeRow").style.display="";
      setLock(false);
      toSetup();
    }
    function readyEnabled(ok){ if(state.online && !ready)$("mpReadyBtn").disabled=!ok; }

    /* ----- 盤面大小 / 好友互動表情 ----- */
    function amHost(){ return isHost; }
    function setBoardSize(n){ if(isHost&&roomRef&&n>=5&&n<=7) roomRef.child("size").set(n); }
    // 目前房間的玩家清單(給表情面板挑對象用),含顯示名與是否為自己
    function roster(){ return Object.keys(players).map(id=>({ id:id, name:dispName(id), me:id===meId })); }
    function sendEmote(to,emoji){
      if(!roomRef||!meId)return;
      const ref=roomRef.child("emotes").push();
      ref.set({ from:meId, to:to||"all", emoji:String(emoji).slice(0,8), at:firebase.database.ServerValue.TIMESTAMP });
      ref.onDisconnect().remove();
      setTimeout(()=>{ try{ ref.remove(); }catch(e){} }, 6000);   // 秀完自動清掉,避免資料無限累積
    }
    // 收到互動:只顯示「給全部」「給我」「我自己送出」的;針對某人 → 動畫落在那個人的晶片
    function handleEmote(e){
      if(!e||!e.emoji)return;
      const to=e.to||"all";
      if(to!=="all" && to!==meId && e.from!==meId)return;
      const fromNm=dispName(e.from)+(e.from===meId?"(你)":"");
      const toNm=(to==="all")?"全部人":dispName(to)+(to===meId?"(你)":"");
      showEmote(e.emoji, fromNm+" → "+toNm, (to!=="all")?to:e.from);
      if(e.from!==meId && (to==="all"||to===meId)) Sound.emote();
    }

    return { available, openConnect, closeConnect, create, join, scanRooms, toggleReady, startGame,
             setTarget, setOrderMethod, throwRps, confirmOrder, again, leave,
             reportLines, tryWin, readyEnabled, isMyTurn, isCalled, tap,
             amHost, setSize:setBoardSize, roster, sendEmote, revealSkip, bailFromRps };
  })();

  $("mpBack").addEventListener("click",()=>MP.closeConnect());
  $("mpCreate").addEventListener("click",()=>MP.create($("mpName").value,$("mpCreateCode").value));
  $("mpJoin").addEventListener("click",()=>MP.join($("mpCode").value,$("mpName").value));
  $("mpScan").addEventListener("click",()=>MP.scanRooms());
  // 沒填房號 → 加入鈕停用(有填任何數字才亮起)
  const syncJoinBtn=()=>{ $("mpJoin").disabled = !$("mpCode").value.replace(/\D/g,"").length; };
  $("mpCode").addEventListener("input",syncJoinBtn); syncJoinBtn();
  $("mpReadyBtn").addEventListener("click",()=>MP.toggleReady());
  $("mpStartBtn").addEventListener("click",()=>MP.startGame());
  $("orderSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;MP.setOrderMethod(b.dataset.order);});
  $("rpsBtns").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;MP.throwRps(b.dataset.rps);b.blur();});
  $("revealSkip").addEventListener("click",()=>MP.revealSkip());
  $("mpVeilLeave").addEventListener("click",()=>MP.bailFromRps());
  $("orderConfirm").addEventListener("click",()=>MP.confirmOrder());
  $("mpLeaveBtn").addEventListener("click",()=>MP.leave());
  $("mpAgain").addEventListener("click",()=>MP.again());
  $("mpLeaveWin").addEventListener("click",()=>MP.leave());
  addEventListener("resize",()=>{if(state.won){const cv=$("confetti");cv.width=innerWidth;cv.height=innerHeight;}});

  buildSwatches();
  loadPrefs();
  applyGridCols();syncSizeSeg();
  render();applyFillUI();
  syncSettingsUI();
})();
</script>
</body>
</html>
